    // ── Mock AI response ──────────────────────────────────────
    function getMockResponse(question) {
      const q = question.toLowerCase();
      if (q.includes('hối lộ') || q.includes('tham nhũng') || q.includes('tham ô')) {
        return `📋 PHÂN TÍCH TỘI PHẠM THAM NHŨNG\n(Chế độ offline – Dữ liệu nội bộ)\n\n1. CĂN CỨ PHÁP LÝ:\n   • Tội Nhận hối lộ: Điều 354 BLHS 2015 (sửa đổi 2017)\n   • Tội Tham ô tài sản: Điều 353 BLHS 2015\n   • Hướng dẫn: NQ 03/2020/NQ-HĐTP; Án lệ 52/2022/AL\n\n2. CẤU THÀNH TỘI PHẠM:\n   • Chủ thể: Người có chức vụ, quyền hạn\n   • Hành vi: Lợi dụng chức vụ để nhận lợi ích vật chất\n   • Lỗi: Cố ý trực tiếp\n\n3. ĐỀ XUẤT HƯỚNG XỬ LÝ:\n   • Xác định tư cách pháp lý của chủ thể\n   • Thu thập chứng cứ về hành vi nhận/đưa hối lộ\n   • Đối chiếu Điều 354 và định khung hình phạt\n\n⚡ Để phân tích chuyên sâu, vui lòng kết nối API hoặc mô tả cụ thể tình huống.`;
      }
      if (q.includes('tạm giam') || q.includes('tạm giữ') || q.includes('ngăn chặn')) {
        return `📋 BIỆN PHÁP NGĂN CHẶN TRONG TTHS\n(Chế độ offline – Dữ liệu nội bộ)\n\n1. CĂN CỨ: Điều 109–125 BLTTHS 2015\n\n2. ĐIỀU KIỆN TẠM GIAM (Điều 119):\n   • Bị can phạm tội đặc biệt/rất nghiêm trọng\n   • Có căn cứ bị can sẽ bỏ trốn hoặc cản trở điều tra\n   • Thời hạn tối đa giai đoạn điều tra: 4 tháng\n\n3. LƯU Ý THỰC TIỄN:\n   • Kiểm sát lệnh tạm giam trong 24h (Điều 120)\n   • Theo dõi thời hạn theo từng vụ án\n   • Xem TB RKN 01/2024 về theo dõi thời hạn tố tụng\n\n⚡ Nhập tình huống cụ thể để được hỗ trợ chi tiết hơn.`;
      }
      if (q.includes('cướp') || q.includes('cưỡng đoạt') || q.includes('tài sản')) {
        return `📋 PHÂN BIỆT TỘI CƯỚP VÀ CƯỠNG ĐOẠT TÀI SẢN\n(Chế độ offline – Dữ liệu nội bộ)\n\n1. TỘI CƯỚP TÀI SẢN (Điều 168 BLHS):\n   • Dùng vũ lực/đe dọa dùng vũ lực ngay tức khắc\n   • Làm nạn nhân không thể chống cự\n   • Thực hiện ngay tại hiện trường\n\n2. TỘI CƯỠNG ĐOẠT TÀI SẢN (Điều 170 BLHS):\n   • Đe dọa sẽ gây hại trong tương lai\n   • Nạn nhân có thời gian suy xét, nhưng bị áp lực\n   • Không cần dùng vũ lực trực tiếp\n\n3. ĐIỂM PHÂN BIỆT THEN CHỐT:\n   • Thời điểm thực hiện hành vi đe dọa\n   • Mức độ và tính chất của đe dọa\n   • Khả năng phản kháng của bị hại\n\n⚡ Tham khảo Án lệ 43/2021/AL về định tội danh.`;
      }
      return `📋 PHÂN TÍCH NGHIỆP VỤ\n(Chế độ offline)\n\n1. CĂN CỨ PHÁP LÝ ÁP DỤNG:\n   • Bộ luật Hình sự 2015 (sửa đổi, bổ sung 2017)\n   • Bộ luật Tố tụng Hình sự 2015\n   • Các văn bản hướng dẫn nghiệp vụ VKSND Tối cao\n\n2. ĐÁNH GIÁ TÌNH HUỐNG:\n   • Cần xem xét đầy đủ 04 yếu tố cấu thành tội phạm\n   • Đảm bảo nguyên tắc suy đoán vô tội (Điều 13 BLTTHS)\n   • Rà soát thời hạn tố tụng theo từng giai đoạn\n\n3. ĐỀ XUẤT HƯỚNG XỬ LÝ:\n   • Thu thập, đánh giá toàn diện chứng cứ\n   • Tham khảo án lệ tương tự trong hệ thống\n   • Phối hợp với phòng nghiệp vụ nếu vụ án phức tạp\n\n⚡ Kết nối internet và API để nhận phân tích AI chuyên sâu.`;
    }

    // ── CSS-in-JS ─────────────────────────────────────────────
    const CSS = `
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

      .app { display:flex; flex-direction:column; height:100vh; background:#05090F; color:#DDD6C8; font-family:'IBM Plex Sans',sans-serif; overflow:hidden; }

      /* TOPBAR */
      .topbar { height:54px; background:#080D19; border-bottom:1px solid #C9A84C22; display:flex; align-items:center; justify-content:space-between; padding:0 20px; position:sticky; top:0; z-index:200; flex-shrink:0; gap:12px; }
      .topbar-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
      .topbar-logo-icon { width:32px; height:32px; background:linear-gradient(135deg,#C9A84C,#7A5A1E); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:16px; }
      .topbar-logo-text { font-family:'Crimson Pro',serif; font-size:18px; font-weight:700; color:#C9A84C; letter-spacing:1px; }
      .topbar-logo-sub { font-size:10px; color:#5A6B8A; letter-spacing:0.5px; }
      .topbar-ticker { flex:1; overflow:hidden; min-width:0; }
      .topbar-ticker-inner { white-space:nowrap; font-size:12px; color:#8A9BBF; animation:ticker 40s linear infinite; display:inline-block; }

      .topbar-ticker-inner span { color:#C9A84C; margin-right:6px; }
      .topbar-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
      .topbar-search { background:#0E1828; border:1px solid #ffffff18; border-radius:6px; padding:7px 36px 7px 12px; color:#DDD6C8; font-size:13px; width:200px; font-family:'IBM Plex Sans',sans-serif; outline:none; transition:border-color 0.2s; }
      .topbar-search:focus { border-color:#C9A84C88; }
      .topbar-search-wrap { position:relative; }
      .topbar-search-wrap::after { content:'🔍'; position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:12px; pointer-events:none; }
      .btn-trolyao { background:linear-gradient(135deg,#C9A84C,#8A6020); border:none; color:#07110A; font-weight:700; font-size:12px; padding:8px 14px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity 0.2s; font-family:'IBM Plex Sans',sans-serif; white-space:nowrap; }
      .btn-trolyao:hover { opacity:0.85; }
      .avatar-btn { background:#0E1828; border:1px solid #C9A84C33; border-radius:7px; padding:5px 10px; cursor:pointer; display:flex; align-items:center; gap:8px; color:#DDD6C8; user-select:none; }
      .avatar-btn:hover { border-color:#C9A84C66; }
      .avatar-name { font-size:12px; font-weight:600; }
      .avatar-role { font-size:10px; color:#C9A84C; }

      /* LAYOUT */
      .layout { display:flex; flex:1; overflow:hidden; min-height:0; }

      /* SIDEBAR */
      .sidebar { width:220px; background:#080D19; border-right:1px solid #C9A84C18; display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; overflow-x:hidden; transition:width 0.2s; }
      .sidebar-section { padding:14px 10px 6px; }
      .sidebar-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#3A4B6A; padding:0 8px; margin-bottom:6px; }
      .nav-item { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:7px; cursor:pointer; font-size:13px; color:#8A9BBF; border:none; background:none; width:100%; text-align:left; transition:all 0.18s; margin-bottom:2px; }
      .nav-item:hover { background:#C9A84C12; color:#DDD6C8; }
      .nav-item.active { background:#C9A84C1A; color:#C9A84C; font-weight:600; border-left:2px solid #C9A84C; }
      .nav-item .nav-icon { font-size:15px; flex-shrink:0; }
      .nav-badge { margin-left:auto; background:#C9A84C22; color:#C9A84C; font-size:10px; padding:1px 7px; border-radius:10px; }
      .sidebar-divider { height:1px; background:linear-gradient(90deg,transparent,#C9A84C33,transparent); margin:10px 14px; }
      .sidebar-footer { padding:12px 14px; border-top:1px solid #C9A84C18; flex-shrink:0; }
      .sidebar-footer-online { font-size:11px; color:#5A6B8A; }
      .sidebar-footer-online::before { content:'● '; color:#27AE60; }

      /* MAIN */
      .main { flex:1; overflow-y:auto; overflow-x:hidden; padding:24px 28px; min-width:0; }

      /* PAGE HEADER */
      .page-header { margin-bottom:24px; }
      .page-title { font-family:'Crimson Pro',serif; font-size:26px; font-weight:700; color:#E8E0D0; letter-spacing:-0.3px; }
      .page-sub { font-size:13px; color:#6A7A9B; margin-top:4px; }
      .gold-line { height:1px; background:linear-gradient(90deg,#C9A84C,transparent); width:60px; margin:10px 0; }

      /* CARDS */
      .card { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; }
      .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
      .stat-box { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; border-left:3px solid var(--c); cursor:pointer; transition:background 0.2s; }
      .stat-box:hover { background:#C9A84C06; }
      .stat-val { font-size:28px; font-weight:700; color:var(--c); letter-spacing:-1px; margin:6px 0 2px; }
      .stat-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#5A6B8A; }
      .stat-sub { font-size:11px; color:#3A4B6A; margin-top:2px; }

      /* SUB-TABS */
      .subtabs { display:flex; gap:4px; margin-bottom:20px; background:#0C1425; border-radius:8px; padding:4px; width:fit-content; max-width:100%; overflow-x:auto; flex-shrink:0; }

      .subtab.active { background:#C9A84C1F; color:#C9A84C; }

      /* SEARCH BAR */
      .search-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
      .search-input { flex:1; min-width:160px; background:#0C1425; border:1px solid #ffffff12; border-radius:7px; padding:10px 14px; color:#DDD6C8; font-size:13px; font-family:'IBM Plex Sans',sans-serif; outline:none; transition:border-color 0.2s; }

      /* TABLE */
      .tbl-head { display:grid; padding:10px 14px; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#3A4B6A; border-bottom:1px solid #ffffff08; }
      .tbl-row { display:grid; padding:13px 14px; border-bottom:1px solid #ffffff06; cursor:pointer; transition:background 0.15s; align-items:center; }
      .tbl-row:hover { background:#C9A84C08; }
      .tbl-title { font-size:13px; font-weight:600; color:#DDD6C8; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .tbl-sub { font-size:11px; color:#6A7A9B; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
      .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap; }

      .badge-red    { background:#E74C3C15; color:#E74C3C; border:1px solid #E74C3C30; }

      .badge-gold   { background:#C9A84C15; color:#C9A84C; border:1px solid #C9A84C30; }

      .badge-orange { background:#D3540015; color:#D35400; border:1px solid #D3540030; }
      .badge-grey   { background:#95A5A615; color:#95A5A6; border:1px solid #95A5A630; }

      .field-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:22px; }

      .field-name { font-size:12px; font-weight:600; color:#DDD6C8; margin-bottom:4px; line-height:1.3; }
      .field-count { font-size:11px; }

      .al-principle-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#8E44AD; margin-bottom:5px; }
      .al-principle-text { font-size:13px; color:#B8AFCE; line-height:1.6; }

      /* MODAL */
      .overlay { position:fixed; inset:0; background:#000000C0; z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); padding:16px; }
      .modal { background:#0F1930; border:1px solid #C9A84C33; border-radius:14px; padding:28px; max-width:700px; width:100%; max-height:88vh; overflow-y:auto; animation:fadeUp 0.2s ease; }

      .modal-title { font-family:'Crimson Pro',serif; font-size:20px; font-weight:700; color:#E8E0D0; margin-bottom:6px; line-height:1.3; }
      .modal-sep { height:1px; background:linear-gradient(90deg,#C9A84C55,transparent); margin:16px 0; }
      .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
      .modal-field-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#3A4B6A; margin-bottom:4px; }
      .modal-field-val { font-size:14px; color:#DDD6C8; }
      .modal-actions { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
      .btn-primary { background:linear-gradient(135deg,#C9A84C,#8A6020); border:none; color:#07110A; font-weight:700; padding:10px 20px; border-radius:7px; cursor:pointer; font-size:13px; font-family:'IBM Plex Sans',sans-serif; transition:opacity 0.2s; }
      .btn-primary:hover { opacity:0.88; }
      .btn-primary:disabled { opacity:0.45; cursor:default; }
      .btn-sec { background:#C9A84C14; border:1px solid #C9A84C30; color:#C9A84C; padding:9px 16px; border-radius:7px; cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif; transition:background 0.2s; }
      .btn-sec:hover { background:#C9A84C22; }
      .btn-ghost { background:none; border:1px solid #ffffff12; color:#8A9BBF; padding:9px 16px; border-radius:7px; cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif; transition:background 0.2s; }
      .btn-ghost:hover { background:#ffffff08; }

      /* NOTIFICATION */
      .notif { position:fixed; bottom:22px; right:22px; background:#0F1930; border-radius:9px; padding:12px 18px; font-size:13px; z-index:999; animation:slideUp 0.25s ease; max-width:340px; box-shadow:0 8px 32px #00000060; }
      @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

      /* DASHBOARD */
      .dash-two { display:grid; grid-template-columns:1.7fr 1fr; gap:18px; margin-bottom:22px; }
      .doc-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #ffffff06; cursor:pointer; min-width:0; }
      .doc-item:hover .doc-item-title { color:#C9A84C; }
      .doc-item:last-child { border-bottom:none; }
      .doc-item-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
      .doc-item-title { font-size:13px; font-weight:600; color:#DDD6C8; transition:color 0.15s; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .doc-item-meta { font-size:11px; color:#6A7A9B; margin-top:2px; }
      .bar-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; cursor:pointer; }
      .bar-track { flex:1; height:4px; background:#ffffff08; border-radius:2px; }
      .bar-fill { height:100%; border-radius:2px; transition:width 0.4s ease; }
      .section-title { font-size:14px; font-weight:600; color:#DDD6C8; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
      .section-title-more { margin-left:auto; font-size:12px; color:#C9A84C; cursor:pointer; font-weight:400; }
      .section-title-more:hover { text-decoration:underline; }

      /* AI CHAT */
      .ai-wrap { display:flex; flex-direction:column; height:calc(100vh - 54px); max-width:820px; }
      .ai-chat-history { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:16px; padding-right:4px; margin-bottom:12px; min-height:0; }
      .ai-msg { display:flex; flex-direction:column; max-width:86%; }
      .ai-msg-user { align-self:flex-end; }
      .ai-msg-ai { align-self:flex-start; }
      .ai-msg-sender { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
      .ai-msg-user .ai-msg-sender { color:#C9A84C; text-align:right; }
      .ai-msg-ai .ai-msg-sender { color:#5A6B8A; }
      .ai-msg-bubble { padding:12px 16px; border-radius:10px; font-size:13px; line-height:1.75; white-space:pre-wrap; }
      .ai-msg-user .ai-msg-bubble { background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); color:#E8E0D0; border-bottom-right-radius:3px; }
      .ai-msg-ai .ai-msg-bubble { background:#0C1425; border:1px solid #ffffff0E; color:#C8BFAE; border-bottom-left-radius:3px; }
      .ai-typing { display:flex; gap:4px; align-items:center; padding:14px 16px; }
      .ai-dot { width:6px; height:6px; background:#C9A84C; border-radius:50%; animation:aiDot 1.4s infinite ease-in-out both; }
      .ai-dot:nth-child(1) { animation-delay:-0.32s; }
      .ai-dot:nth-child(2) { animation-delay:-0.16s; }
      @keyframes aiDot { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
      .ai-input-area { background:#0C1425; border:1px solid #C9A84C22; border-radius:10px; padding:4px; display:flex; gap:8px; flex-shrink:0; transition:border-color 0.2s; }
      .ai-input-area:focus-within { border-color:#C9A84C55; }
      .ai-input { flex:1; background:none; border:none; color:#DDD6C8; font-family:'IBM Plex Sans',sans-serif; font-size:14px; padding:12px 14px; outline:none; resize:none; min-height:48px; max-height:120px; overflow-y:auto; }
      .ai-send { background:linear-gradient(135deg,#C9A84C,#8A6020); border:none; color:#07110A; font-weight:700; padding:10px 18px; border-radius:7px; cursor:pointer; font-size:13px; align-self:flex-end; margin:4px; font-family:'IBM Plex Sans',sans-serif; transition:opacity 0.2s; white-space:nowrap; }
      .ai-send:hover { opacity:0.88; }
      .ai-send:disabled { opacity:0.45; cursor:not-allowed; }
      .scenario-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; flex-shrink:0; }
      .chip { border:1px solid #C9A84C2A; border-radius:20px; padding:6px 14px; font-size:12px; cursor:pointer; color:#C9A84C; background:#C9A84C08; transition:background 0.15s; text-align:left; }
      .chip:hover { background:#C9A84C18; }

      /* RESPONSIVE ≤900px */
      @media (max-width:900px) {
        .sidebar { width:56px; overflow-x:hidden; }
        .sidebar .nav-item { padding:10px 0; justify-content:center; border-left:none !important; }
        .sidebar .nav-item span:not(.nav-icon) { display:none; }
        .sidebar .nav-badge { display:none; }
        .sidebar .sidebar-label { display:none; }
        .sidebar .sidebar-footer { display:none; }
        .main { padding:16px; }
        .stat-grid { grid-template-columns:repeat(2,1fr); }
        .field-grid { grid-template-columns:repeat(2,1fr); }
        .qt-grid { grid-template-columns:1fr; }
        .dash-two { grid-template-columns:1fr; }
        .topbar-ticker { display:none; }
        .topbar-search { width:130px; }
        .avatar-name { display:none; }
        .avatar-role { display:none; }
        .modal { padding:18px; }
        .modal-grid { grid-template-columns:1fr; }
        .ai-wrap { height:calc(100vh - 54px); }
      }

      /* RESPONSIVE ≤600px */
      @media (max-width:600px) {
        .topbar { padding:0 12px; }
        .topbar-search-wrap { display:none; }
        .main { padding:12px; }
        .field-grid { grid-template-columns:repeat(2,1fr); }
        .tbl-head, .tbl-row { font-size:11px; }
      }
    `;

    // ── Helpers ───────────────────────────────────────────────
    function getBadgeClass(loai) {
      const map = {
        "Bộ luật":"badge-red","Luật":"badge-blue","Nghị quyết":"badge-purple",
        "Nghị định":"badge-orange","Thông tư":"badge-green","Quyết định":"badge-gold","Chỉ thị":"badge-green"
      };
      return "badge " + (map[loai] || "badge-grey");
    }

    function useBodyScrollLock(active) {
      useEffect(() => {
        if (active) { document.body.style.overflow = 'hidden'; }
        else        { document.body.style.overflow = ''; }
        return () => { document.body.style.overflow = ''; };
      }, [active]);
    }

    // ── NOTIFICATION ─────────────────────────────────────────
    function Notif({ msg, type, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 3200);
        return () => clearTimeout(t);
      }, [onDone]);
      const isErr = type === 'err';
      return (
        <div className="notif" style={{ border:`1px solid ${isErr?'#E74C3C44':'#C9A84C44'}`, color:isErr?'#E74C3C':'#C9A84C' }}>
          {isErr ? '⚠️' : '✅'} {msg}
        </div>
      );
    }

    // ── DASHBOARD ─────────────────────────────────────────────
    function Dashboard({ setTab, setSelField }) {
      const totalDocs = DOCS.length;
      return (
        <div>
          <div style={{background:'#C9A84C0A',border:'1px solid #C9A84C22',borderRadius:9,padding:'10px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12,fontSize:13,color:'#8A9BBF'}}>
            <span style={{fontSize:20,flexShrink:0}}>📁</span>
            <span>Hệ thống được tổng hợp từ nguồn<strong style={{color:'#C9A84C'}}>VKSND TP.Cần Thơ</strong> · <strong style={{color:'#C9A84C'}}>bao gồm 2.564 văn bản</strong> · Nhấn <strong style={{color:'#C9A84C'}}>📂 mục cần xem</strong> để xem toàn văn</span>
          </div>

          <div className="page-header">
            <div style={{fontSize:12,color:'#C9A84C',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>VKSND TP. Cần Thơ</div>
            <div className="page-title">Hệ Thống Tra Cứu Pháp Luật</div>
            <div className="page-sub">Tổng hợp văn bản pháp quy • Quy trình nghiệp vụ • Án lệ • Thông báo rút kinh nghiệm</div>
            <div className="gold-line" />
          </div>

          {/* STATS */}
          <div className="stat-grid">
            {[
              { lbl:"Văn bản pháp luật", val:DOCS.length, sub:`${DOCS.filter(d=>d.hieu==='Còn hiệu lực').length} còn hiệu lực`, c:"#C9A84C", icon:"📜", tab:'vanbanluat' },
              { lbl:"Quy trình nghiệp vụ", val:QUYTRINH.length, sub:"Đang áp dụng", c:"#3498DB", icon:"📋", tab:'quytrinh' },
              { lbl:"Thông báo rút kinh nghiệm", val:RKN.length, sub:"Năm 2024", c:"#E74C3C", icon:"📢", tab:'rutkn' },
              { lbl:"Án lệ", val:ANLE.length, sub:"TAND Tối cao", c:"#8E44AD", icon:"⚖️", tab:'anle' },
            ].map((s,i) => (
              <div key={i} className="stat-box" style={{'--c':s.c}} onClick={()=>setTab(s.tab)}>
                <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
                <div className="stat-val">{s.val}</div>
                <div className="stat-lbl">{s.lbl}</div>
                <div className="stat-sub">{s.sub}</div>
              </div>
            ))}
          </div>

          {/* MAIN TWO-COL */}
          <div className="dash-two">
            <div className="card">
              <div className="section-title">
                📜 Văn bản mới nhất
                <span className="section-title-more" onClick={()=>setTab('vanbanluat')}>Xem tất cả →</span>
              </div>
              {DOCS.slice(0,6).map(doc => (
                <div key={doc.id} className="doc-item" onClick={()=>setTab('vanbanluat')}>
                  <div className="doc-item-icon" style={{background:`${LOAI_COLOR[doc.loai]||'#C9A84C'}18`}}>
                    {doc.loai==='Bộ luật'||doc.loai==='Luật'?'📘':'📋'}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="doc-item-title">{doc.soHieu} – {doc.tenVanBan}</div>
                    <div className="doc-item-meta">{doc.coQuan} · {doc.ngayBanHanh}</div>
                  </div>
                  <span className="badge badge-green" style={{flexShrink:0}}>HLực</span>
                </div>
              ))}
            </div>

            <div className="card">
              <div className="section-title">📊 Phân bổ lĩnh vực</div>
              {LEGAL_FIELDS.slice(0,8).map(f => {
                const cnt = DOCS.filter(d=>d.linhVuc.includes(f.id)).length;
                return (
                  <div key={f.id} className="bar-item" onClick={()=>{setSelField(f.id);setTab('vanbanluat')}}>
                    <span style={{fontSize:14,width:22}}>{f.icon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#8A9BBF',marginBottom:3}}>
                        <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                        <span style={{color:f.color,flexShrink:0,marginLeft:4}}>{cnt}</span>
                      </div>
                      <div className="bar-track">
                        <div className="bar-fill" style={{width:`${totalDocs>0?Math.max((cnt/totalDocs)*100,cnt>0?6:0):0}%`,background:f.color}} />
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* QUICK ACCESS */}
          <div className="card" style={{marginBottom:0}}>
            <div className="section-title">⚡ Truy cập nhanh</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10}}>
              {[
                {icon:'📜',label:'Văn bản pháp luật',sub:`${DOCS.length} văn bản`,tab:'vanbanluat',color:'#C9A84C'},
                {icon:'📋',label:'Quy trình nghiệp vụ',sub:`${QUYTRINH.length} quy trình`,tab:'quytrinh',color:'#3498DB'},
                {icon:'📢',label:'Rút kinh nghiệm',sub:`${RKN.length} thông báo`,tab:'rutkn',color:'#E74C3C'},
                {icon:'⚖️',label:'Tra cứu án lệ',sub:`${ANLE.length} án lệ`,tab:'anle',color:'#8E44AD'},
                {icon:'📨',label:'Văn bản nghiệp vụ',sub:`${CONGVAN.length} văn bản`,tab:'congvan',color:'#3498DB'},
                {icon:'🤖',label:'Trợ lý AI',sub:'Phân tích pháp lý',tab:'trolyao',color:'#C9A84C'},
              ].map((q,i)=>(
                <div key={i} onClick={()=>setTab(q.tab)}
                  style={{background:'#080D19',border:`1px solid ${q.color}22`,borderRadius:9,padding:'14px 16px',cursor:'pointer',transition:'all 0.2s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=q.color+'55';e.currentTarget.style.background=q.color+'0A';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=q.color+'22';e.currentTarget.style.background='#080D19';}}>

                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── VĂN BẢN PHÁP LUẬT ────────────────────────────────────
    function VanBanLuat({ selField, setSelField, notify, globalQ }) {
      const [q, setQ]       = useState(globalQ || '');
      const [loai, setLoai] = useState('Tất cả');
      const [hl, setHl]     = useState('Tất cả');
      const [sel, setSel]   = useState(null);

      // Đồng bộ tìm kiếm toàn cục khi được truyền vào
      useEffect(() => { if (globalQ) setQ(globalQ); }, [globalQ]);

      useBodyScrollLock(!!sel);

      const filtered = useMemo(() => DOCS.filter(d => {
        const mF = !selField || d.linhVuc.includes(selField);
        const mL = loai === 'Tất cả' || d.loai === loai;
        const mH = hl   === 'Tất cả' || d.hieu === hl;
        const mQ = !q.trim() || [d.soHieu, d.tenVanBan, d.tomTat, d.coQuan, ...(d.tags||[])].some(s => s && s.toLowerCase().includes(q.trim().toLowerCase()));
        return mF && mL && mH && mQ;
      }), [q, loai, hl, selField]);

      return (
        <div>
          <div className="page-header">
            <div className="page-title">I. Hệ Thống Văn Bản Pháp Luật</div>
            <div className="page-sub">Tổng hợp Bộ luật, Luật, Nghị định, Thông tư và các văn bản quy phạm pháp luật</div>
            <div className="gold-line" />
          </div>

          {/* FIELD FILTER GRID */}
          <div className="field-grid">
            {LEGAL_FIELDS.map(f => {
              const cnt = DOCS.filter(d=>d.linhVuc.includes(f.id)).length;
              return (
                <div key={f.id} className={`field-card${selField===f.id?' sel':''}`} onClick={()=>setSelField(selField===f.id?null:f.id)}>
                  <div className="field-icon">{f.icon}</div>
                  <div className="field-name">{f.name}</div>
                  <div className="field-count" style={{color:f.color}}>{cnt} văn bản</div>
                </div>
              );
            })}
          </div>

          {/* SEARCH + FILTER */}
          <div className="search-bar">
            <input className="search-input" placeholder="🔍  Nhập số hiệu, tên văn bản, từ khóa..." value={q} onChange={e=>setQ(e.target.value)} />
            <select className="filter-select" value={loai} onChange={e=>setLoai(e.target.value)}>
              {DOC_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
            <select className="filter-select" value={hl} onChange={e=>setHl(e.target.value)}>
              {DOC_STATUS.map(t=><option key={t}>{t}</option>)}
            </select>
            {selField && <button className="btn-sec" onClick={()=>setSelField(null)}>✕ Bỏ lọc lĩnh vực</button>}
          </div>

          {/* TABLE */}
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div className="tbl-head" style={{gridTemplateColumns:'2.5fr 1fr 1fr 1fr 90px'}}>
              <div>Số hiệu / Tên văn bản</div><div>Loại</div><div>Cơ quan</div><div>Ngày ban hành</div><div>Hiệu lực</div>
            </div>
            {filtered.length === 0
              ? <div style={{padding:'48px 0',textAlign:'center',color:'#3A4B6A'}}>
                  <div style={{fontSize:40,marginBottom:12}}>📭</div>
                  Không tìm thấy văn bản phù hợp
                </div>
              : filtered.map(doc => (
                <div key={doc.id} className="tbl-row" style={{gridTemplateColumns:'2.5fr 1fr 1fr 1fr 90px'}} onClick={()=>setSel(doc)}>
                  <div style={{minWidth:0}}>
                    <div className="tbl-title">{doc.soHieu}</div>
                    <div className="tbl-sub">{doc.tenVanBan}</div>
                  </div>
                  <div><span className={getBadgeClass(doc.loai)}>{doc.loai}</span></div>
                  <div className="tbl-sub">{doc.coQuan}</div>
                  <div className="tbl-sub">{doc.ngayBanHanh}</div>
                  <div>
                    <span className={doc.hieu==='Còn hiệu lực'?'badge badge-green':'badge badge-red'}>
                      {doc.hieu==='Còn hiệu lực'?'Hiệu lực':'Hết HL'}
                    </span>
                  </div>
                </div>
              ))
            }
          </div>

          {/* MODAL CHI TIẾT */}
          {sel && (
            <div className="overlay" onClick={()=>setSel(null)}>
              <div className="modal" onClick={e=>e.stopPropagation()}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:11,color:'#C9A84C',marginBottom:4,letterSpacing:0.5}}>SỐ HIỆU: {sel.soHieu}</div>
                    <div className="modal-title">{sel.tenVanBan}</div>
                    <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
                      <span className={getBadgeClass(sel.loai)}>{sel.loai}</span>
                      <span className={sel.hieu==='Còn hiệu lực'?'badge badge-green':sel.hieu==='Hết hiệu lực'?'badge badge-red':'badge badge-gold'}>{sel.hieu}</span>
                    </div>
                  </div>
                  <button onClick={()=>setSel(null)} style={{background:'none',border:'none',color:'#6A7A9B',fontSize:20,cursor:'pointer',flexShrink:0,padding:'4px 8px'}}>✕</button>
                </div>
                <div className="modal-sep" />
                <div className="modal-grid">
                  {[
                    ['Cơ quan ban hành', sel.coQuan],
                    ['Ngày ban hành',    sel.ngayBanHanh],
                    ['Ngày hiệu lực',   sel.ngayHieuLuc||'—'],
                    ['Lĩnh vực',        LEGAL_FIELDS.filter(f=>sel.linhVuc.includes(f.id)).map(f=>f.name).join(', ')||'—'],
                  ].map(([l,v])=>(
                    <div key={l}><div className="modal-field-lbl">{l}</div><div className="modal-field-val">{v}</div></div>
                  ))}
                </div>

              {lvs.map(l=><option key={l}>{l}</option>)}
            </select>
          </div>

          <div style={{background:'#C9A84C0A',border:'1px solid #C9A84C22',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:13,color:'#8A9BBF'}}>
            📁 Dữ liệu tích hợp từ <strong style={{color:'#C9A84C'}}>Van_ban_phap_luat.chm</strong>
            &nbsp;· Tổng <strong style={{color:'#C9A84C'}}>{CONGVAN.length}</strong> văn bản
            &nbsp;· Kết quả: <strong style={{color:'#C9A84C'}}>{filtered.length}</strong>
          </div>

          {/* TABLE */}
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div className="tbl-head" style={{gridTemplateColumns:'2fr 1.2fr 1.2fr 0.6fr 100px'}}>
              <div>Số hiệu / Tên văn bản</div><div>Loại</div><div>Cơ quan</div><div>Năm</div><div>Lĩnh vực</div>
            </div>
            {filtered.length === 0
              ? <div style={{padding:'48px 0',textAlign:'center',color:'#3A4B6A'}}>
                  <div style={{fontSize:40,marginBottom:12}}>📭</div>Không tìm thấy văn bản phù hợp
                </div>
              : filtered.map(cv=>(
                <div key={cv.id} className="tbl-row" style={{gridTemplateColumns:'2fr 1.2fr 1.2fr 0.6fr 100px'}} onClick={()=>setSel(cv)}>
                  <div style={{minWidth:0}}>
                    <div className="tbl-title">{cv.soHieu}</div>
                    <div className="tbl-sub">{cv.tenVanBan}</div>
                  </div>
                  <div>
                    <span className="badge" style={{background:`${LOAI_CV_COLOR[cv.loai]||'#95A5A6'}18`,color:LOAI_CV_COLOR[cv.loai]||'#95A5A6',border:`1px solid ${LOAI_CV_COLOR[cv.loai]||'#95A5A6'}33`}}>
                      {cv.loai}
                    </span>
                  </div>
                  <div className="tbl-sub">{cv.coQuan}</div>
                  <div className="tbl-sub">{cv.nam}</div>
                  <div>
                    <span className="badge badge-gold" style={{fontSize:10}}>
                      {cv.linhVuc && cv.linhVuc.length > 12 ? cv.linhVuc.slice(0,12)+'…' : cv.linhVuc}
                    </span>
                  </div>
                </div>
              ))
            }
          </div>

          {/* MODAL */}
          {sel && (
            <div className="overlay" onClick={()=>setSel(null)}>
              <div className="modal" onClick={e=>e.stopPropagation()}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:11,color:'#C9A84C',marginBottom:4}}>{sel.loai} · {sel.nam}</div>
                    <div className="modal-title">{sel.tenVanBan}</div>
                    <div style={{marginTop:8,display:'flex',gap:8,flexWrap:'wrap'}}>
                      <span className="badge" style={{background:`${LOAI_CV_COLOR[sel.loai]||'#95A5A6'}18`,color:LOAI_CV_COLOR[sel.loai]||'#95A5A6',border:`1px solid ${LOAI_CV_COLOR[sel.loai]||'#95A5A6'}33`}}>{sel.loai}</span>
                      <span className="badge badge-blue">{sel.linhVuc}</span>
                    </div>
                  </div>
                  <button onClick={()=>setSel(null)} style={{background:'none',border:'none',color:'#6A7A9B',fontSize:20,cursor:'pointer',flexShrink:0,padding:'4px 8px'}}>✕</button>
                </div>
                <div className="modal-sep" />
                <div className="modal-grid">
                  <div><div className="modal-field-lbl">Số hiệu</div><div className="modal-field-val">{sel.soHieu}</div></div>
                  <div><div className="modal-field-lbl">Cơ quan ban hành</div><div className="modal-field-val">{sel.coQuan}</div></div>
                  <div><div className="modal-field-lbl">Năm ban hành</div><div className="modal-field-val">{sel.nam}</div></div>
                  <div><div className="modal-field-lbl">Lĩnh vực</div><div className="modal-field-val">{sel.linhVuc}</div></div>
                </div>
                {sel.tomTat && (
                  <div style={{marginBottom:14}}>
                    <div className="modal-field-lbl">Tóm tắt nội dung</div>
                    <div style={{fontSize:14,color:'#B0A898',lineHeight:1.75,marginTop:6}}>{sel.tomTat}</div>
                  </div>
                )}
                <div style={{background:'#C9A84C0A',border:'1px solid #C9A84C22',borderRadius:8,padding:'12px 14px',fontSize:13,color:'#B0A898',lineHeight:1.7}}>
                  📁 Văn bản này tích hợp từ file <strong style={{color:'#C9A84C'}}>Van_ban_phap_luat.chm</strong>.<br/>
                  Tên file nội bộ: <code style={{color:'#C9A84C',fontSize:12}}>{sel.file}</code>
                </div>
                <div className="modal-actions">
                  {sel.link
                    ? <button className="btn-primary" onClick={()=>{window.open(sel.link,'_blank');notify('Đang mở toàn văn...')}}>📄 Xem toàn văn</button>
                    : sel.file
                      ? <button className="btn-primary" onClick={()=>{openCHM(sel.file);notify('Đang mở trong CHM...')}}>📂 Mở trong CHM</button>
                      : <button className="btn-primary" disabled>📄 Chưa có file</button>
                  }
                  <button className="btn-sec" onClick={()=>notify('Đã lưu vào danh sách')}>💾 Lưu</button>
                  <button className="btn-sec" onClick={()=>notify('Đã xuất PDF')}>📄 Xuất PDF</button>
                  <button className="btn-ghost" onClick={()=>setSel(null)}>Đóng</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── TRỢ LÝ ẢO AI (Chat history + mock fallback) ──────────
    function TroLyAo({ notify }) {
      const [messages, setMessages] = useState([{
        role: 'ai',
        text: `Xin chào đồng chí! Tôi là Trợ lý AI của VKSND TP. Cần Thơ.\n\nTôi có thể hỗ trợ đồng chí:\n• Phân tích cấu thành tội phạm theo BLHS 2015\n• Tra cứu điều khoản, thủ tục tố tụng\n• Tổng hợp án lệ và thông báo rút kinh nghiệm\n• Gợi ý hướng đề xuất xử lý vụ việc\n\nĐồng chí cần hỗ trợ vấn đề gì hôm nay?`
      }]);
      const [q, setQ]           = useState('');
      const [loading, setLoading] = useState(false);
      const chatEndRef            = useRef(null);
      const textareaRef           = useRef(null);

      const SCENARIOS = [
        "Phân tích dấu hiệu pháp lý tội Nhận hối lộ theo Điều 354 BLHS 2015",
        "Tóm tắt điểm mới của Luật Đất đai 2024 so với 2013",
        "Phân biệt tội Cướp tài sản và Cưỡng đoạt tài sản",
        "Điều kiện áp dụng biện pháp tạm giam bị can theo BLTTHS",
        "Thủ tục khởi kiện tranh chấp hợp đồng tại Tòa án nhân dân",
      ];

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      const send = useCallback(async () => {
        const text = q.trim();
        if (!text || loading) return;

        setMessages(prev => [...prev, { role: 'user', text }]);
        setQ('');
        setLoading(true);

        // Reset textarea height
        if (textareaRef.current) {
          textareaRef.current.style.height = '48px';
        }

        // Build messages for API (chuyển đổi role ai → assistant)
        const apiMessages = messages
          .filter((_, i) => i > 0) // bỏ lời chào mặc định
          .map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.text }))
          .concat([{ role: 'user', content: text }]);

        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 20000);

          const r = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            signal: controller.signal,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: `Bạn là Trợ lý Pháp lý AI của VKSND TP. Cần Thơ.
Nhiệm vụ: Hỗ trợ kiểm sát viên phân tích nghiệp vụ kiểm sát chuyên sâu.
Quy tắc phản hồi:
- Luôn trích dẫn điều khoản cụ thể (Điều X, Khoản Y của Luật/BLTTHS/BLHS)
- Phân tích theo cấu trúc rõ ràng: Cơ sở pháp lý → Phân tích → Đề xuất
- Trả lời bằng tiếng Việt pháp lý, chính xác, chuyên nghiệp
- Nêu rõ nếu cần tham khảo thêm chuyên gia hoặc văn bản cụ thể`,
              messages: apiMessages
            })
          });

          clearTimeout(timeoutId);

          if (!r.ok) {
            const errMap = { 401:'AUTH_ERROR', 429:'RATE_LIMIT', 500:'SERVER_ERROR' };
            throw new Error(errMap[r.status] || 'API_ERROR');
          }

          const d = await r.json();
          const aiText = d.content?.map(c => c.text || '').join('') || 'Không có phản hồi.';
          setMessages(prev => [...prev, { role: 'ai', text: aiText }]);

        } catch (err) {
          let fallback;
          if (err.name === 'AbortError') {
            fallback = '⏱️ Kết nối quá thời gian chờ (20s). Vui lòng kiểm tra đường truyền mạng và thử lại.';
          } else if (err.message === 'AUTH_ERROR') {
            fallback = '⚠️ Lỗi xác thực API. Vui lòng liên hệ quản trị viên để cấu hình kết nối.';
          } else if (err.message === 'RATE_LIMIT') {
            fallback = '⏳ Hệ thống đang xử lý nhiều yêu cầu. Vui lòng thử lại sau ít phút.';
          } else {
            // Phản hồi dự phòng thông minh từ dữ liệu nội bộ
            fallback = getMockResponse(text);
          }
          setMessages(prev => [...prev, { role: 'ai', text: fallback }]);
        } finally {
          setLoading(false);
        }
      }, [q, loading, messages]);

      const handleKeyDown = useCallback((e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      }, [send]);

      const handleInput = useCallback((e) => {
        setQ(e.target.value);
        e.target.style.height = '48px';
        e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
      }, []);

      return (
        <div className="ai-wrap">
          <div className="page-header" style={{flexShrink:0}}>
            <div className="page-title">🤖 Trợ Lý Pháp Lý AI</div>
            <div className="page-sub">Phân tích nghiệp vụ · Tra cứu pháp luật · Tư vấn áp dụng</div>
            <div className="gold-line" />
          </div>

          {/* CHAT HISTORY */}
          <div className="ai-chat-history">
            {messages.map((m, i) => (
              <div key={i} className={`ai-msg ${m.role === 'user' ? 'ai-msg-user' : 'ai-msg-ai'}`}>
                <div className="ai-msg-sender">
                  {m.role === 'user' ? 'Kiểm sát viên' : 'AI'}
                </div>
                <div className="ai-msg-bubble">{m.text}</div>
              </div>
            ))}
            {loading && (
              <div className="ai-msg ai-msg-ai">
                <div className="ai-msg-sender">AI đang phân tích</div>
                <div className="ai-msg-bubble" style={{padding:0}}>
                  <div className="ai-typing">
                    <div className="ai-dot" />
                    <div className="ai-dot" />
                    <div className="ai-dot" />
                  </div>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          {/* SCENARIO CHIPS – chỉ hiện ở đầu cuộc hội thoại */}
          {messages.length <= 1 && (
            <div className="scenario-chips">
              {SCENARIOS.map((s,i) => (
                <button key={i} className="chip" onClick={()=>setQ(s)}>{s}</button>
              ))}
            </div>
          )}

          {/* INPUT AREA */}
          <div className="ai-input-area">
            <textarea
              ref={textareaRef}
              className="ai-input"
              placeholder="Đặt câu hỏi hoặc mô tả tình huống pháp lý cần phân tích... (Enter để gửi, Shift+Enter xuống dòng)"
              value={q}
              onChange={handleInput}
              onKeyDown={handleKeyDown}
            />
            <button className="ai-send" onClick={send} disabled={loading || !q.trim()}>
              {loading ? '⏳' : 'Gửi ↗'}
            </button>
          </div>
        </div>
      );
    }

    // ── APP ROOT ──────────────────────────────────────────────
    function App() {
      const [tab,        setTab]        = useState('dashboard');
      const [selField,   setSelField]   = useState(null);
      const [notif,      setNotif]      = useState(null);
      const [showProfile,setShowProfile]= useState(false);
      const [userRole,   setUserRole]   = useState('Kiểm sát viên');
      const [globalQ,    setGlobalQ]    = useState('');
      const profileRef = useRef(null);
      const notifKey   = useRef(0);

      // Đóng dropdown profile khi click ra ngoài
      useEffect(() => {
        if (!showProfile) return;
        const handler = (e) => {
          if (profileRef.current && !profileRef.current.contains(e.target)) {
            setShowProfile(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showProfile]);

      const notify = useCallback((msg, type='ok') => {
        notifKey.current += 1;
        setNotif({ msg, type, key: notifKey.current });
      }, []);

      const handleGlobalSearch = (e) => {
        const val = e.target.value;
        setGlobalQ(val);
        if (val.trim() && tab !== 'vanbanluat') setTab('vanbanluat');
      };

      const NAV = [
        { id:'dashboard',  label:'Tổng quan',           icon:'🏠' },
        { id:'vanbanluat', label:'Văn bản pháp luật',   icon:'📜', badge: DOCS.length },
        { id:'quytrinh',   label:'Quy trình nghiệp vụ', icon:'📋', badge: QUYTRINH.length },
        { id:'rutkn',      label:'Rút kinh nghiệm',     icon:'📢', badge: RKN.length },
        { id:'anle',       label:'Án lệ',               icon:'⚖️', badge: ANLE.length },
        { id:'congvan',    label:'Văn bản nghiệp vụ',   icon:'📨', badge: CONGVAN.length },
        { id:'trolyao',    label:'Trợ lý AI',            icon:'🤖' },
      ];

      return (
        <div className="app">
          <style>{CSS}</style>

          {/* TOPBAR */}
          <div className="topbar">
            <div className="topbar-logo">
              <div className="topbar-logo-icon">⚖</div>
              <div>
                <div className="topbar-logo-text">VKSND TP. CẦN THƠ</div>
                <div className="topbar-logo-sub">HỆ THỐNG VĂN BẢN PHÁP LUẬT</div>
              </div>
            </div>

            <div className="topbar-ticker">
              <div className="topbar-ticker-inner">
                <span>Mới:</span> Luật Đất đai 2024 có hiệu lực từ 01/08/2024 &nbsp;·&nbsp;
                <span>Mới:</span> Án lệ số 61/2024/AL về lừa đảo qua mạng xã hội &nbsp;·&nbsp;
                <span>Mới:</span> Thông báo RKN số 05/2024/TB-VKSCT về thi hành án dân sự &nbsp;·&nbsp;
                <span>Mới:</span> NĐ 13/2023/NĐ-CP về bảo vệ dữ liệu cá nhân &nbsp;·&nbsp;
                <span>Mới:</span> HD 04/2026/VKSTC về nghiệp vụ hình sự 2026
              </div>
            </div>

            <div className="topbar-right">
              <div className="topbar-search-wrap">
                <input
                  className="topbar-search"
                  placeholder="Tìm kiếm nhanh..."
                  value={globalQ}
                  onChange={handleGlobalSearch}
                  onKeyDown={e => { if(e.key==='Escape'){setGlobalQ('');} }}
                />
              </div>
              <button className="btn-trolyao" onClick={()=>setTab('trolyao')}>🤖 Trợ Lý AI</button>

              {/* PROFILE DROPDOWN */}
              <div style={{position:'relative'}} ref={profileRef}>
                <div className="avatar-btn" onClick={()=>setShowProfile(v=>!v)}>
                  <span style={{fontSize:20}}>👤</span>
                  <div>
                    <div className="avatar-name">Tài khoản VIP</div>
                    <div className="avatar-role">{userRole}</div>
                  </div>
                  <span style={{color:'#C9A84C',fontSize:10,marginLeft:2}}>{showProfile?'▲':'▼'}</span>
                </div>
                {showProfile && (
                  <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'#0F1930',border:'1px solid #C9A84C22',borderRadius:10,padding:8,width:200,zIndex:300,boxShadow:'0 8px 32px #00000080'}}>
                    <div style={{fontSize:10,color:'#3A4B6A',letterSpacing:1,textTransform:'uppercase',padding:'4px 8px 8px'}}>Vai trò</div>
                    {['Kiểm sát viên','Quản trị viên','Người tra cứu'].map(r=>(
                      <div key={r}
                        onClick={()=>{setUserRole(r);setShowProfile(false);notify(`Đã chuyển vai trò: ${r}`);}}
                        style={{padding:'8px 10px',borderRadius:6,cursor:'pointer',fontSize:13,background:userRole===r?'#C9A84C18':'none',color:userRole===r?'#C9A84C':'#DDD6C8',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'background 0.15s'}}>
                        {r} {userRole===r && <span>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="layout">
            {/* SIDEBAR */}
            <div className="sidebar">
              <div className="sidebar-section">
                <div className="sidebar-label">Menu chính</div>
                {NAV.map(n => (
                  <button key={n.id} className={`nav-item${tab===n.id?' active':''}`} onClick={()=>{setTab(n.id);if(n.id!=='vanbanluat')setGlobalQ('');}}>
                    <span className="nav-icon">{n.icon}</span>
                    <span>{n.label}</span>
                    {n.badge != null && <span className="nav-badge">{n.badge}</span>}
                  </button>
                ))}
              </div>
              <div className="sidebar-divider" />
              <div className="sidebar-section">
                <div className="sidebar-label">Lĩnh vực</div>
                {LEGAL_FIELDS.slice(0,8).map(f => (
                  <button key={f.id} className={`nav-item${selField===f.id?' active':''}`}
                    onClick={()=>{setSelField(selField===f.id?null:f.id);setTab('vanbanluat');}}>
                    <span className="nav-icon">{f.icon}</span>
                    <span style={{fontSize:12}}>{f.name}</span>
                  </button>
                ))}
              </div>
              <div style={{flex:1}} />
              <div className="sidebar-footer">
                <div className="sidebar-footer-online">Đang kết nối CSDL</div>
                <div style={{fontSize:10,color:'#3A4B6A',marginTop:4}}>Cập nhật: 05/2026</div>
              </div>
            </div>

            {/* MAIN CONTENT */}
            <div className="main">
              {tab==='dashboard'  && <Dashboard  setTab={setTab} setSelField={setSelField} />}
              {tab==='vanbanluat' && <VanBanLuat selField={selField} setSelField={setSelField} notify={notify} globalQ={globalQ} />}
              {tab==='quytrinh'   && <QuyTrinh   notify={notify} />}
              {tab==='rutkn'      && <RutKinhNghiem notify={notify} />}
              {tab==='anle'       && <AnLe        notify={notify} />}
              {tab==='congvan'    && <CongVanNghiepVu notify={notify} />}
              {tab==='trolyao'    && <TroLyAo     notify={notify} />}
            </div>
          </div>

          {/* NOTIFICATION – key dùng counter để trigger mount mới khi notify liên tục */}
          {notif && (
            <Notif
              key={notif.key}
              msg={notif.msg}
              type={notif.type}
              onDone={useCallback(()=>setNotif(null),[])}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
