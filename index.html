<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống văn bản - VKSND TP.Cần Thơ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <style>

    ::-webkit-scrollbar-track { background: #0B1120; }

    ::-webkit-scrollbar-thumb:hover { background: #C9A84C; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ── Dữ liệu từ database.js ──────────────────────────────
    const DOCS      = typeof VKS_DATABASE       !== 'undefined' ? VKS_DATABASE       : [];
    const QUYTRINH  = typeof VKS_QUY_TRINH      !== 'undefined' ? VKS_QUY_TRINH      : [];
    const RKN       = typeof VKS_RUT_KINH_NGHIEM!== 'undefined' ? VKS_RUT_KINH_NGHIEM: [];
    const ANLE      = typeof VKS_AN_LE          !== 'undefined' ? VKS_AN_LE          : [];

    const LEGAL_FIELDS = [
      { id:1,  name:"Hình sự",             icon:"⚖️",  color:"#C0392B" },
      { id:2,  name:"Dân sự",              icon:"👥",  color:"#2980B9" },
      { id:3,  name:"Hành chính",          icon:"🏛️", color:"#8E44AD" },
      { id:4,  name:"Kinh tế–Thương mại",  icon:"📊",  color:"#D35400" },
      { id:5,  name:"Lao động",            icon:"👷",  color:"#27AE60" },
      { id:6,  name:"Đất đai–Nhà ở",       icon:"🏠",  color:"#16A085" },
      { id:7,  name:"Hôn nhân & GĐ",       icon:"💑",  color:"#E91E63" },
      { id:8,  name:"Doanh nghiệp–ĐT",     icon:"🏢",  color:"#F39C12" },
      { id:9,  name:"Thuế–Tài chính",      icon:"💰",  color:"#1ABC9C" },
      { id:10, name:"Ngân hàng–CK",        icon:"🏦",  color:"#3498DB" },
      { id:11, name:"Sở hữu trí tuệ",      icon:"💡",  color:"#9B59B6" },
      { id:12, name:"Xây dựng–BĐS",        icon:"🏗️", color:"#E67E22" },
      { id:13, name:"Môi trường",          icon:"🌿",  color:"#2ECC71" },
      { id:14, name:"Giao thông",          icon:"🚦",  color:"#E74C3C" },
      { id:15, name:"An ninh mạng–CNTT",   icon:"🔐",  color:"#34495E" },
      { id:16, name:"Tố tụng",             icon:"📋",  color:"#2C3E50" },
      { id:17, name:"Thi hành án",         icon:"🔨",  color:"#7F8C8D" },
      { id:18, name:"Khiếu nại–Tố cáo",   icon:"📣",  color:"#C0392B" },
      { id:19, name:"Phòng chống TN",      icon:"🛡️", color:"#8E44AD" },
      { id:20, name:"Lĩnh vực khác",       icon:"📁",  color:"#95A5A6" },
    ];

    const DOC_TYPES   = ["Tất cả","Bộ luật","Luật","Nghị quyết","Nghị định","Thông tư","Quyết định","Chỉ thị"];
    const DOC_STATUS  = ["Tất cả","Còn hiệu lực","Hết hiệu lực","Chưa có hiệu lực"];
    const LOAI_COLOR  = { "Bộ luật":"#C0392B","Luật":"#2980B9","Nghị quyết":"#8E44AD","Nghị định":"#D35400","Thông tư":"#27AE60","Quyết định":"#F39C12","Chỉ thị":"#16A085" };

    // ── CSS-in-JS ──────────────────────────────────────────
    const CSS = `
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

      .app { display:flex; flex-direction:column; min-height:100vh; background:#05090F; color:#DDD6C8; font-family:'IBM Plex Sans',sans-serif; }

      /* TOPBAR */
      .topbar { height:54px; background:#080D19; border-bottom:1px solid #C9A84C22; display:flex; align-items:center; justify-content:space-between; padding:0 20px; position:sticky; top:0; z-index:200; flex-shrink:0; }
      .topbar-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
      .topbar-logo-icon { width:32px; height:32px; background:linear-gradient(135deg,#C9A84C,#7A5A1E); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:16px; }
      .topbar-logo-text { font-family:'Crimson Pro',serif; font-size:18px; font-weight:700; color:#C9A84C; letter-spacing:1px; }
      .topbar-logo-sub { font-size:10px; color:#5A6B8A; letter-spacing:0.5px; }
      .topbar-ticker { flex:1; overflow:hidden; margin:0 24px; }
      .topbar-ticker-inner { white-space:nowrap; font-size:12px; color:#8A9BBF; animation:ticker 40s linear infinite; display:inline-block; }
      @keyframes ticker { from{transform:translateX(100%)} to{transform:translateX(-100%)} }
      .topbar-ticker-inner span { color:#C9A84C; margin-right:6px; }
      .topbar-right { display:flex; align-items:center; gap:10px; }
      .topbar-search { background:#0E1828; border:1px solid #ffffff18; border-radius:6px; padding:7px 36px 7px 12px; color:#DDD6C8; font-size:13px; width:220px; font-family:'IBM Plex Sans',sans-serif; outline:none; transition:border-color 0.2s; }
      .topbar-search:focus { border-color:#C9A84C55; }
      .topbar-search-wrap { position:relative; }
      .topbar-search-wrap::after { content:'🔍'; position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:12px; pointer-events:none; }
      .btn-trolyao { background:linear-gradient(135deg,#C9A84C,#8A6020); border:none; color:#07110A; font-weight:700; font-size:12px; padding:8px 16px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity 0.2s; font-family:'IBM Plex Sans',sans-serif; }
      .btn-trolyao:hover { opacity:0.85; }
      .avatar-btn { background:#0E1828; border:1px solid #C9A84C33; border-radius:7px; padding:5px 10px; cursor:pointer; display:flex; align-items:center; gap:8px; color:#DDD6C8; }
      .avatar-name { font-size:12px; font-weight:600; }
      .avatar-role { font-size:10px; color:#C9A84C; }

      /* LAYOUT */
      .layout { display:flex; flex:1; overflow:hidden; }

      /* SIDEBAR */
      .sidebar { width:220px; background:#080D19; border-right:1px solid #C9A84C18; display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
      .sidebar-section { padding:14px 10px 6px; }
      .sidebar-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#3A4B6A; padding:0 8px; margin-bottom:6px; }
      .nav-item { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:7px; cursor:pointer; font-size:13px; color:#8A9BBF; border:none; background:none; width:100%; text-align:left; transition:all 0.18s; margin-bottom:2px; }
      .nav-item:hover { background:#C9A84C12; color:#DDD6C8; }
      .nav-item.active { background:#C9A84C1A; color:#C9A84C; font-weight:600; border-left:2px solid #C9A84C; }
      .nav-item .nav-icon { font-size:15px; flex-shrink:0; }
      .nav-badge { margin-left:auto; background:#C9A84C22; color:#C9A84C; font-size:10px; padding:1px 7px; border-radius:10px; }
      .sidebar-divider { height:1px; background:linear-gradient(90deg,transparent,#C9A84C33,transparent); margin:10px 14px; }
      .sidebar-footer { padding:12px 14px; border-top:1px solid #C9A84C18; }
      .sidebar-footer-online { font-size:11px; color:#5A6B8A; }
      .sidebar-footer-online::before { content:'● '; color:#27AE60; }

      /* MAIN */
      .main { flex:1; overflow-y:auto; padding:24px 28px; }

      /* PAGE HEADER */
      .page-header { margin-bottom:24px; }
      .page-title { font-family:'Crimson Pro',serif; font-size:26px; font-weight:700; color:#E8E0D0; letter-spacing:-0.3px; }
      .page-sub { font-size:13px; color:#6A7A9B; margin-top:4px; }
      .gold-line { height:1px; background:linear-gradient(90deg,#C9A84C,transparent); width:60px; margin:10px 0; }

      /* CARDS */
      .card { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; }
      .card-gold { border-left:3px solid #C9A84C; }
      .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
      .stat-box { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; border-left:3px solid var(--c); }
      .stat-val { font-size:28px; font-weight:700; color:var(--c); letter-spacing:-1px; margin:6px 0 2px; }
      .stat-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#5A6B8A; }
      .stat-sub { font-size:11px; color:#3A4B6A; margin-top:2px; }

      /* TABS (sub-tabs inside modules) */
      .subtabs { display:flex; gap:4px; margin-bottom:20px; background:#0C1425; border-radius:8px; padding:4px; width:fit-content; }
      .subtab { padding:7px 16px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:none; color:#8A9BBF; transition:all 0.18s; }
      .subtab.active { background:#C9A84C1F; color:#C9A84C; }

      /* SEARCH BAR */
      .search-bar { display:flex; gap:10px; margin-bottom:16px; }
      .search-input { flex:1; background:#0C1425; border:1px solid #ffffff12; border-radius:7px; padding:10px 14px; color:#DDD6C8; font-size:13px; font-family:'IBM Plex Sans',sans-serif; outline:none; }
      .search-input:focus { border-color:#C9A84C55; }
      .filter-select { background:#0C1425; border:1px solid #ffffff12; border-radius:7px; padding:10px 12px; color:#DDD6C8; font-size:13px; outline:none; cursor:pointer; }

      /* TABLE */
      .tbl-head { display:grid; padding:10px 14px; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#3A4B6A; border-bottom:1px solid #ffffff08; }
      .tbl-row { display:grid; padding:13px 14px; border-bottom:1px solid #ffffff06; cursor:pointer; transition:background 0.15s; align-items:center; }
      .tbl-row:hover { background:#C9A84C08; }
      .tbl-title { font-size:13px; font-weight:600; color:#DDD6C8; margin-bottom:3px; }
      .tbl-sub { font-size:11px; color:#6A7A9B; }
      .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:500; }
      .badge-green  { background:#27AE6015; color:#27AE60; border:1px solid #27AE6030; }
      .badge-red    { background:#E74C3C15; color:#E74C3C; border:1px solid #E74C3C30; }
      .badge-blue   { background:#2980B915; color:#2980B9; border:1px solid #2980B930; }
      .badge-gold   { background:#C9A84C15; color:#C9A84C; border:1px solid #C9A84C30; }
      .badge-purple { background:#8E44AD15; color:#8E44AD; border:1px solid #8E44AD30; }
      .badge-orange { background:#D3540015; color:#D35400; border:1px solid #D3540030; }

      /* FIELD GRID */
      .field-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:22px; }
      .field-card { background:#0C1425; border:1px solid #ffffff0A; border-radius:9px; padding:14px; cursor:pointer; transition:all 0.2s; }
      .field-card:hover { border-color:#C9A84C44; transform:translateY(-2px); background:#C9A84C08; }
      .field-card.sel { border-color:#C9A84C; background:#C9A84C12; }
      .field-icon { font-size:22px; margin-bottom:8px; }
      .field-name { font-size:12px; font-weight:600; color:#DDD6C8; margin-bottom:4px; line-height:1.3; }
      .field-count { font-size:11px; }

      /* QUY TRINH CARDS */
      .qt-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
      .qt-card { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; cursor:pointer; transition:all 0.2s; }
      .qt-card:hover { border-color:#C9A84C33; background:#C9A84C06; }
      .qt-tag { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#C9A84C; margin-bottom:8px; }
      .qt-title { font-size:14px; font-weight:600; color:#DDD6C8; line-height:1.4; margin-bottom:10px; }
      .qt-meta { font-size:11px; color:#6A7A9B; margin-bottom:12px; }
      .qt-steps { display:flex; flex-direction:column; gap:6px; }
      .qt-step { display:flex; align-items:flex-start; gap:8px; font-size:12px; color:#8A9BBF; }
      .qt-step-num { width:18px; height:18px; background:#C9A84C22; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#C9A84C; flex-shrink:0; }

      /* RKN CARDS */
      .rkn-card { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; margin-bottom:14px; cursor:pointer; transition:all 0.2s; border-left:3px solid #E74C3C; }
      .rkn-card:hover { border-color:#E74C3C; background:#E74C3C06; }
      .rkn-so { font-size:11px; color:#E74C3C; font-weight:600; margin-bottom:6px; letter-spacing:0.5px; }
      .rkn-title { font-size:14px; font-weight:600; color:#DDD6C8; line-height:1.4; margin-bottom:8px; }
      .rkn-section { margin-top:10px; }
      .rkn-section-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#3A4B6A; margin-bottom:4px; }
      .rkn-section-text { font-size:13px; color:#8A9BBF; line-height:1.6; }

      /* AN LE CARDS */
      .al-card { background:#0C1425; border:1px solid #ffffff0A; border-radius:10px; padding:18px; margin-bottom:14px; cursor:pointer; transition:all 0.2s; border-left:3px solid #8E44AD; }
      .al-card:hover { background:#8E44AD06; }
      .al-so { font-size:11px; color:#8E44AD; font-weight:700; margin-bottom:6px; }
      .al-title { font-size:15px; font-weight:600; color:#DDD6C8; font-family:'Crimson Pro',serif; line-height:1.4; margin-bottom:8px; }
      .al-lv { font-size:11px; }
      .al-body { font-size:13px; color:#8A9BBF; line-height:1.65; margin-top:10px; }
      .al-principle { background:#8E44AD0D; border:1px solid #8E44AD22; border-radius:7px; padding:12px; margin-top:12px; }
      .al-principle-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#8E44AD; margin-bottom:5px; }
      .al-principle-text { font-size:13px; color:#B8AFCE; line-height:1.6; }

      /* MODAL */
      .overlay { position:fixed; inset:0; background:#000000C0; z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
      .modal { background:#0F1930; border:1px solid #C9A84C33; border-radius:14px; padding:28px; max-width:700px; width:92%; max-height:85vh; overflow-y:auto; animation:fadeUp 0.2s ease; }
      @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
      .modal-title { font-family:'Crimson Pro',serif; font-size:20px; font-weight:700; color:#E8E0D0; margin-bottom:6px; line-height:1.3; }
      .modal-sep { height:1px; background:linear-gradient(90deg,#C9A84C55,transparent); margin:16px 0; }
      .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
      .modal-field-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#3A4B6A; margin-bottom:4px; }
      .modal-field-val { font-size:14px; color:#DDD6C8; }
      .modal-actions { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
      .btn-primary { background:linear-gradient(135deg,#C9A84C,#8A6020); border:none; color:#07110A; font-weight:700; padding:10px 20px; border-radius:7px; cursor:pointer; font-size:13px; font-family:'IBM Plex Sans',sans-serif; transition:opacity 0.2s; }
      .btn-primary:hover { opacity:0.88; }
      .btn-sec { background:#C9A84C14; border:1px solid #C9A84C30; color:#C9A84C; padding:9px 16px; border-radius:7px; cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif; transition:background 0.2s; }
      .btn-sec:hover { background:#C9A84C22; }
      .btn-ghost { background:none; border:1px solid #ffffff12; color:#8A9BBF; padding:9px 16px; border-radius:7px; cursor:pointer; font-size:12px; font-family:'IBM Plex Sans',sans-serif; }

      /* NOTIF */
      .notif { position:fixed; bottom:22px; right:22px; background:#0F1930; border:1px solid #C9A84C44; border-radius:9px; padding:12px 18px; font-size:13px; z-index:999; animation:slideUp 0.25s ease; max-width:340px; }
      @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

      /* DASHBOARD EXTRA */
      .dash-two { display:grid; grid-template-columns:1.7fr 1fr; gap:18px; margin-bottom:22px; }
      .doc-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #ffffff06; cursor:pointer; }
      .doc-item:hover .doc-item-title { color:#C9A84C; }
      .doc-item:last-child { border-bottom:none; }
      .doc-item-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
      .doc-item-title { font-size:13px; font-weight:600; color:#DDD6C8; transition:color 0.15s; }
      .doc-item-meta { font-size:11px; color:#6A7A9B; margin-top:2px; }
      .bar-item { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
      .bar-track { flex:1; height:4px; background:#ffffff08; border-radius:2px; }
      .bar-fill { height:100%; border-radius:2px; }
      .section-title { font-size:14px; font-weight:600; color:#DDD6C8; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
      .section-title-more { margin-left:auto; font-size:12px; color:#C9A84C; cursor:pointer; font-weight:400; }
      .section-title-more:hover { text-decoration:underline; }

      /* AI SECTION */
      .ai-wrap { max-width:780px; }
      .ai-input-area { background:#0C1425; border:1px solid #C9A84C22; border-radius:10px; padding:4px; display:flex; gap:8px; }
      .ai-input { flex:1; background:none; border:none; color:#DDD6C8; font-family:'IBM Plex Sans',sans-serif; font-size:14px; padding:12px 14px; outline:none; resize:none; min-height:48px; }
      .ai-send { background:linear-gradient(135deg,#C9A84C,#8A6020); border:none; color:#07110A; font-weight:700; padding:10px 20px; border-radius:7px; cursor:pointer; font-size:13px; align-self:flex-end; margin:4px; font-family:'IBM Plex Sans',sans-serif; }
      .ai-send:disabled { opacity:0.5; cursor:not-allowed; }
      .ai-response { background:#0C1425; border:1px solid #C9A84C22; border-radius:10px; padding:18px; margin-top:16px; font-size:14px; line-height:1.75; color:#C8BFAE; white-space:pre-wrap; }
      .scenario-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
      .chip { border:1px solid #C9A84C2A; border-radius:20px; padding:6px 14px; font-size:12px; cursor:pointer; color:#C9A84C; background:#C9A84C08; transition:background 0.15s; }
      .chip:hover { background:#C9A84C18; }

      @media (max-width:900px) {
        .sidebar { width:60px; }
        .nav-item span:not(.nav-icon) { display:none; }
        .nav-badge { display:none; }
        .sidebar-label { display:none; }
        .stat-grid { grid-template-columns:repeat(2,1fr); }
        .field-grid { grid-template-columns:repeat(3,1fr); }
        .qt-grid { grid-template-columns:1fr; }
        .dash-two { grid-template-columns:1fr; }
        .topbar-ticker { display:none; }
      }
    `;

    // ── Helpers ─────────────────────────────────────────────
    function Notif({ msg, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
      return <div className="notif" style={{ borderColor: type==='err'?'#E74C3C44':'#C9A84C44', color: type==='err'?'#E74C3C':'#C9A84C' }}>
        {type==='err'?'⚠️':'✅'} {msg}
      </div>;
    }

    function getBadgeClass(loai) {
      const map = { "Bộ luật":"badge-red","Luật":"badge-blue","Nghị quyết":"badge-purple","Nghị định":"badge-orange","Thông tư":"badge-green","Quyết định":"badge-gold","Chỉ thị":"badge-green" };
      return "badge " + (map[loai]||"badge-blue");
    }

    // ── DASHBOARD ────────────────────────────────────────────
    function Dashboard({ setTab, setSelField }) {
      return <div>
        <div className="page-header">
          <div style={{fontSize:12,color:'#C9A84C',letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>VKSND TP. Cần Thơ</div>
          <div className="page-title">Hệ Thống Tra Cứu Pháp Luật</div>
          <div className="page-sub">Tổng hợp văn bản pháp quy • Quy trình nghiệp vụ • Án lệ • Thông báo rút kinh nghiệm</div>
          <div className="gold-line" />
        </div>

    // ── VĂN BẢN PHÁP LUẬT ───────────────────────────────────

      const [q, setQ]     = useState('');
      const [loai, setLoai] = useState('Tất cả');
      const [hl, setHl]   = useState('Tất cả');
      const [sel, setSel] = useState(null);

      const filtered = useMemo(() => DOCS.filter(d => {
        const mF   = !selField || d.linhVuc.includes(selField);
        const mL   = loai === 'Tất cả' || d.loai === loai;
        const mH   = hl   === 'Tất cả' || d.hieu === hl;
        const mQ   = !q   || [d.soHieu, d.tenVanBan, d.tomTat, d.coQuan].some(s => s.toLowerCase().includes(q.toLowerCase()));
        return mF && mL && mH && mQ;
      }), [q, loai, hl, selField]);

      return <div>
        <div className="page-header">
          <div className="page-title">I. Hệ Thống Văn Bản Pháp Luật</div>
          <div className="page-sub">Tổng hợp Bộ luật, Luật, Nghị định, Thông tư và các văn bản quy phạm pháp luật</div>
          <div className="gold-line" />
        </div>

        {/* FIELD FILTER */}
        <div className="field-grid">
          {LEGAL_FIELDS.map(f => {
            const cnt = DOCS.filter(d=>d.linhVuc.includes(f.id)).length;
            return <div key={f.id} className={`field-card${selField===f.id?' sel':''}`} onClick={()=>setSelField(selField===f.id?null:f.id)}>
              <div className="field-icon">{f.icon}</div>
              <div className="field-name">{f.name}</div>
              <div className="field-count" style={{color:f.color}}>{cnt} văn bản</div>
            </div>;
          })}
        </div>

        {/* SEARCH + FILTER */}
        <div className="search-bar">
          <input className="search-input" placeholder="🔍  Nhập số hiệu, tên văn bản, từ khóa nội dung..." value={q} onChange={e=>setQ(e.target.value)} />
          <select className="filter-select" value={loai} onChange={e=>setLoai(e.target.value)}>
            {DOC_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
          <select className="filter-select" value={hl} onChange={e=>setHl(e.target.value)}>
            {DOC_STATUS.map(t=><option key={t}>{t}</option>)}
          </select>
          {selField && <button className="btn-sec" onClick={()=>setSelField(null)}>✕ Bỏ lọc lĩnh vực</button>}
        </div>

        {/* TABLE */}
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div className="tbl-head" style={{gridTemplateColumns:'2.5fr 1fr 1fr 1fr 90px'}}>
            <div>Số hiệu / Tên văn bản</div><div>Loại</div><div>Cơ quan</div><div>Ngày ban hành</div><div>Hiệu lực</div>

          {filtered.length === 0
            ? <div style={{padding:'48px 0',textAlign:'center',color:'#3A4B6A'}}>
                <div style={{fontSize:40,marginBottom:12}}>📭</div>Không tìm thấy văn bản phù hợp
              </div>
            : filtered.map(doc => (
              <div key={doc.id} className="tbl-row" style={{gridTemplateColumns:'2.5fr 1fr 1fr 1fr 90px'}} onClick={()=>setSel(doc)}>
                <div>
                  <div className="tbl-title">{doc.soHieu}</div>
                  <div className="tbl-sub" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:340}}>{doc.tenVanBan}</div>
                </div>
                <div><span className={getBadgeClass(doc.loai)}>{doc.loai}</span></div>
                <div className="tbl-sub">{doc.coQuan}</div>
                <div className="tbl-sub">{doc.ngayBanHanh}</div>
                <div><span className={doc.hieu==='Còn hiệu lực'?'badge badge-green':'badge badge-red'}>{doc.hieu==='Còn hiệu lực'?'Hiệu lực':'Hết HL'}</span></div>
              </div>
            ))
          }
        </div>

        {/* MODAL */}
        {sel && <div className="overlay" onClick={()=>setSel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
              <div>
                <div style={{fontSize:11,color:'#C9A84C',marginBottom:4,letterSpacing:0.5}}>SỐ HIỆU: {sel.soHieu}</div>
                <div className="modal-title">{sel.tenVanBan}</div>
                <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
                  <span className={getBadgeClass(sel.loai)}>{sel.loai}</span>
                  <span className={sel.hieu==='Còn hiệu lực'?'badge badge-green':'badge badge-red'}>{sel.hieu}</span>
                </div>
              </div>
              <button onClick={()=>setSel(null)} style={{background:'none',border:'none',color:'#6A7A9B',fontSize:20,cursor:'pointer',flexShrink:0}}>✕</button>
            </div>
            <div className="modal-sep" />
            <div className="modal-grid">
              {[['Cơ quan ban hành',sel.coQuan],['Ngày ban hành',sel.ngayBanHanh],['Ngày hiệu lực',sel.ngayHieuLuc||'—'],['Lĩnh vực',LEGAL_FIELDS.filter(f=>sel.linhVuc.includes(f.id)).map(f=>f.name).join(', ')]].map(([l,v])=>(
                <div key={l}><div className="modal-field-lbl">{l}</div><div className="modal-field-val">{v}</div></div>
              ))}
            </div>
            <div className="modal-field-lbl">Tóm tắt nội dung</div>
            <div style={{fontSize:14,lineHeight:1.7,color:'#B0A898',marginTop:6}}>{sel.tomTat}</div>
            {sel.tags && <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:12}}>{sel.tags.map(t=><span key={t} style={{background:'#C9A84C12',border:'1px solid #C9A84C22',borderRadius:20,padding:'2px 10px',fontSize:11,color:'#C9A84C'}}>#{t}</span>)}</div>}
            <div className="modal-actions">
              {sel.link ? <button className="btn-primary" onClick={()=>{window.open(sel.link,'_blank');notify('Đang mở toàn văn...')}}>📄 Xem toàn văn</button>
                        : <button className="btn-primary" style={{opacity:0.6,cursor:'default'}}>📄 Chưa có file</button>}
              <button className="btn-sec" onClick={()=>{notify('Đã lưu vào danh sách')}}>💾 Lưu</button>
              <button className="btn-ghost" onClick={()=>setSel(null)}>Đóng</button>
            </div>
          </div>
        </div>}
      </div>;
    }

    // ── QUY TRÌNH NGHIỆP VỤ ─────────────────────────────────

        {sel && <div className="overlay" onClick={()=>setSel(null)}>

          <div style={{position:'relative',flex:1,minWidth:240}}>
            <input className="search-input" style={{width:'100%',paddingLeft:36}} placeholder="Tìm kiếm án lệ theo tên, nội dung, nguyên tắc áp dụng..." value={q} onChange={e=>setQ(e.target.value)} />
            <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#6A7A9B'}}>🔍</span>
          </div>
          <div className="subtabs" style={{margin:0}}>
            {loais.map(l=><button key={l} className={`subtab${lv===l?' active':''}`} onClick={()=>setLv(l)}>{l}</button>)}
          </div>
        </div>

        {filtered.map(al => (
          <div key={al.id} className="al-card" onClick={()=>setSel(al)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <div className="al-so">{al.soAnLe}</div>
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <span className="badge badge-purple">{al.linhVuc}</span>
                <span style={{fontSize:11,color:'#6A7A9B'}}>{al.ngayBanHanh}</span>
              </div>
            </div>
            <div className="al-title">{al.tieuDe}</div>
            <div className="al-body" style={{display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{al.tomTatVuViec}</div>
            <div style={{marginTop:10,fontSize:11,color:'#8E44AD'}}>📖 Xem nguyên tắc áp dụng và phân tích đầy đủ →</div>
          </div>
        ))}

        {sel && <div className="overlay" onClick={()=>setSel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:11,color:'#8E44AD',marginBottom:4,letterSpacing:0.5}}>{sel.soAnLe} · {sel.coQuan} · {sel.ngayBanHanh}</div>
                <div className="modal-title">{sel.tieuDe}</div>
                <div style={{marginTop:8}}><span className="badge badge-purple">{sel.linhVuc}</span></div>
              </div>
              <button onClick={()=>setSel(null)} style={{background:'none',border:'none',color:'#6A7A9B',fontSize:20,cursor:'pointer'}}>✕</button>
            </div>
            <div className="modal-sep" />
            {[['Tóm tắt vụ việc',sel.tomTatVuViec,'#6A7A9B'],['Nội dung án lệ',sel.noiDung,'#B0A898']].map(([l,v,c])=>(
              <div key={l} style={{marginBottom:14}}>
                <div style={{fontSize:10,letterSpacing:1,textTransform:'uppercase',color:'#3A4B6A',marginBottom:5}}>{l}</div>
                <div style={{fontSize:13,color:c,lineHeight:1.75}}>{v}</div>
              </div>
            ))}
            <div className="al-principle">
              <div className="al-principle-lbl">⚖️ Nguyên tắc pháp lý áp dụng</div>
              <div className="al-principle-text">{sel.nguyenTacApDung}</div>
            </div>
            <div style={{marginTop:14}}>
              <div style={{fontSize:10,letterSpacing:1,textTransform:'uppercase',color:'#3A4B6A',marginBottom:6}}>Văn bản liên quan</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {sel.vanBanLienQuan.map(v=><span key={v} style={{background:'#C9A84C12',border:'1px solid #C9A84C22',borderRadius:5,padding:'3px 10px',fontSize:12,color:'#C9A84C'}}>{v}</span>)}
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn-primary" onClick={()=>notify('Đã xuất án lệ ra PDF')}>📄 Xuất PDF</button>
              <button className="btn-sec" onClick={()=>notify('Đã lưu án lệ')}>💾 Lưu</button>
              <button className="btn-ghost" onClick={()=>setSel(null)}>Đóng</button>
            </div>
          </div>
        </div>}
      </div>;
    }

    // ── AI ASSISTANT ─────────────────────────────────────────
    function TroLyAo({ notify }) {
      const [q, setQ]   = useState('');
      const [res, setRes] = useState('');
      const [loading, setLoading] = useState(false);
      const SCENARIOS = [
        "Phân tích dấu hiệu pháp lý tội Nhận hối lộ theo Điều 354 BLHS 2015",
        "Tóm tắt điểm mới của Luật Đất đai 2024 so với 2013",
        "Phân biệt tội Cướp và Cưỡng đoạt tài sản",
        "Điều kiện áp dụng biện pháp tạm giam bị can theo BLTTHS",
        "Thủ tục khởi kiện tranh chấp hợp đồng tại Tòa án nhân dân",
      ];

      const send = async () => {
        if (!q.trim()) return;
        setLoading(true); setRes('');
        try {
          const r = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:1000,
              system:`Bạn là Trợ lý Pháp lý của VKSND TP. Cần Thơ. Hãy phân tích chuyên sâu theo nghiệp vụ kiểm sát, trích dẫn điều khoản cụ thể, trả lời bằng tiếng Việt rõ ràng có cấu trúc.`,
              messages:[{role:"user",content:q}]
            })
          });
          const d = await r.json();
          setRes(d.content?.map(c=>c.text||'').join('')||'Không có phản hồi.');
        } catch {
          setRes('💡 Kết nối API thử nghiệm:\n\nDựa trên nghiệp vụ kiểm sát và pháp luật hiện hành, tình huống của bạn liên quan đến:\n\n1. Căn cứ pháp lý: Bộ luật Tố tụng Hình sự 2015, Bộ luật Hình sự 2015.\n2. Hướng xử lý: Rà soát hồ sơ, đối chiếu quy định, đảm bảo nguyên tắc suy đoán vô tội.\n3. Đề xuất: Liên hệ Phòng nghiệp vụ để được hỗ trợ cụ thể.');
        }
        setLoading(false);
      };

      return <div className="ai-wrap">
        <div className="page-header">
          <div className="page-title">🤖 Trợ Lý Pháp Lý AI</div>
          <div className="page-sub">Phân tích nghiệp vụ • Tư vấn áp dụng pháp luật • Tóm tắt văn bản</div>
          <div className="gold-line" />
        </div>
        <div className="scenario-chips">
          {SCENARIOS.map((s,i)=><button key={i} className="chip" onClick={()=>setQ(s)}>{s}</button>)}
        </div>
        <div className="ai-input-area">
          <textarea className="ai-input" rows={3} placeholder="Đặt câu hỏi hoặc mô tả tình huống pháp lý cần phân tích..." value={q} onChange={e=>setQ(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} />
          <button className="ai-send" onClick={send} disabled={loading}>{loading?'⏳ Đang phân tích...':'Gửi ↗'}</button>
        </div>
        {res && <div className="ai-response">{res}</div>}
      </div>;
    }

    // ── APP ROOT ─────────────────────────────────────────────
    function App() {
      const [tab, setTab]         = useState('dashboard');
      const [selField, setSelField] = useState(null);
      const [notif, setNotif]     = useState(null);
      const [showProfile, setShowProfile] = useState(false);
      const [userRole, setUserRole] = useState('Kiểm sát viên');

      const notify = (msg, type='ok') => { setNotif({msg,type}); };

      const NAV = [
        { id:'dashboard', label:'Tổng quan',              icon:'🏠' },
        { id:'vanbanluat', label:'Văn bản pháp luật',     icon:'📜', badge: DOCS.length },
        { id:'quytrinh',  label:'Quy trình nghiệp vụ',    icon:'📋', badge: QUYTRINH.length },
        { id:'rutkn',     label:'Rút kinh nghiệm',        icon:'📢', badge: RKN.length },
        { id:'anle',      label:'Án lệ',                  icon:'⚖️', badge: ANLE.length },
        { id:'trolyao',   label:'Trợ lý AI',              icon:'🤖' },
      ];

      return <div className="app">
        <style>{CSS}</style>

        {/* TOPBAR */}
        <div className="topbar">
          <div className="topbar-logo">
            <div className="topbar-logo-icon">⚖</div>
            <div>
              <div className="topbar-logo-text">HỆ THỐNG VĂN BẢN</div>
              <div className="topbar-logo-sub">VKSND TP. CẦN THƠ</div>
            </div>
          </div>
          <div className="topbar-ticker">
            <div className="topbar-ticker-inner">
              <span>Mới:</span> Luật Đất đai 2024 có hiệu lực từ 01/08/2024 &nbsp;·&nbsp;
              <span>Mới:</span> Án lệ số 61/2024/AL về lừa đảo qua mạng xã hội &nbsp;·&nbsp;
              <span>Mới:</span> Thông báo RKN số 05/2024/TB-VKSCT về thi hành án dân sự &nbsp;·&nbsp;
              <span>Mới:</span> NĐ 13/2023/NĐ-CP bảo vệ dữ liệu cá nhân
            </div>
          </div>
          <div className="topbar-right">
            <div className="topbar-search-wrap">
              <input className="topbar-search" placeholder="Tìm kiếm nhanh..." />
            </div>
            <button className="btn-trolyao" onClick={()=>setTab('trolyao')}>🤖 Trợ Lý AI</button>
            <div style={{position:'relative'}}>
              <div className="avatar-btn" onClick={()=>setShowProfile(!showProfile)}>
                <span style={{fontSize:20}}>👤</span>
                <div>
                  <div className="avatar-name">Nguyễn Hoàng Thiên Phúc</div>
                  <div className="avatar-role">{userRole} – VKSND TP. Cần Thơ</div>
                </div>
                <span style={{color:'#C9A84C',fontSize:10}}>▼</span>
              </div>
              {showProfile && <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'#0F1930',border:'1px solid #C9A84C22',borderRadius:10,padding:10,width:200,zIndex:300}}>
                {['Quản trị viên','Kiểm sát viên','Chuyên viên pháp lý','Người tra cứu'].map(r=>(
                  <div key={r} onClick={()=>{setUserRole(r);setShowProfile(false);notify(`Đã chuyển vai trò: ${r}`)}}
                    style={{padding:'7px 10px',borderRadius:6,cursor:'pointer',fontSize:13,background:userRole===r?'#C9A84C18':'none',color:userRole===r?'#C9A84C':'#DDD6C8',display:'flex',justifyContent:'space-between'}}>
                    {r} {userRole===r&&'✓'}
                  </div>
                ))}
              </div>}
            </div>
          </div>
        </div>

        <div className="layout">
          {/* SIDEBAR */}
          <div className="sidebar">
            <div className="sidebar-section">
              <div className="sidebar-label">Menu chính</div>
              {NAV.map(n => (
                <button key={n.id} className={`nav-item${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)}>
                  <span className="nav-icon">{n.icon}</span>
                  <span>{n.label}</span>
                  {n.badge && <span className="nav-badge">{n.badge}</span>}
                </button>
              ))}
            </div>
            <div className="sidebar-divider" />
            <div className="sidebar-section">
              <div className="sidebar-label">Lĩnh vực nổi bật</div>
              {LEGAL_FIELDS.slice(0,8).map(f => (
                <button key={f.id} className={`nav-item${selField===f.id?' active':''}`}
                  onClick={()=>{setSelField(selField===f.id?null:f.id);setTab('vanbanluat')}}>
                  <span className="nav-icon">{f.icon}</span>
                  <span style={{fontSize:12}}>{f.name}</span>
                </button>
              ))}
            </div>
            <div style={{flex:1}} />
            <div className="sidebar-footer">
              <div className="sidebar-footer-online">Đang kết nối CSDL</div>
              <div style={{fontSize:10,color:'#3A4B6A',marginTop:4}}>Cập nhật: 11/05/2026</div>
            </div>
          </div>

          {/* MAIN */}
          <div className="main">
            {tab==='dashboard'  && <Dashboard  setTab={setTab} setSelField={setSelField} />}
            {tab==='vanbanluat' && <VanBanLuat selField={selField} setSelField={setSelField} notify={notify} />}
            {tab==='quytrinh'   && <QuyTrinh   notify={notify} />}
            {tab==='rutkn'      && <RutKinhNghiem notify={notify} />}
            {tab==='anle'       && <AnLe        notify={notify} />}
            {tab==='trolyao'    && <TroLyAo     notify={notify} />}
          </div>
        </div>

        {notif && <Notif key={Date.now()} msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)} />}
      </div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
