        transition: transform 0.3s ease, filter 0.3s ease;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      }
      .welcome-logo:hover {
        transform: scale(1.04);
      }
      .welcome-title {
        font-family: 'Crimson Pro', serif;
        font-size: 38px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 1.5px;
        line-height: 1.15;
        text-shadow: 
          0 2px 4px rgba(0,0,0,0.4),
          0 4px 10px rgba(74, 144, 226, 0.5),
          2px 2px 0 #1a3a6e;
        margin-bottom: 10px;
      }
      .welcome-subtitle {
        font-size: 17px;
        color: #a8c5e8;
        margin-bottom: 28px;
        font-weight: 400;
      }
      .welcome-divider {
        width: 80px;
        height: 3px;
        background: linear-gradient(to right, transparent, #C9A84C, transparent);
        margin: 0 auto 28px;
      }

      @media (max-width:900px) {
        .sidebar { width:60px; }
        .nav-item span:not(.nav-icon) { display:none; }
        .nav-badge { display:none; }
        .sidebar-label { display:none; }
        .stat-grid { grid-template-columns:repeat(2,1fr); }
        .field-grid { grid-template-columns:repeat(3,1fr); }
        .qt-grid { grid-template-columns:1fr; }
        .dash-two { grid-template-columns:1fr; }
        .topbar-ticker { display:none; }
        .welcome-title { font-size: 26px; }
        .welcome-logo { width: 120px; }
      }
    `;

    function Notif({ msg, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
      return <div className="notif" style={{ borderColor: type==='err'?'#E74C3C44':'#C9A84C44', color: type==='err'?'#E74C3C':'#C9A84C' }}>
        {type==='err'?'⚠️':'✅'} {msg}
      </div>;
    }

    function getBadgeClass(loai) {
      const map = { "Bộ luật":"badge-red","Luật":"badge-blue","Nghị quyết":"badge-purple","Nghị định":"badge-orange","Thông tư":"badge-green","Quyết định":"badge-gold","Chỉ thị":"badge-green" };
      return "badge " + (map[loai]||"badge-blue");
    }

    // ── DASHBOARD VỚI LOGO CHÍNH THỨC ───────────────────────────
    function Dashboard({ setTab, setSelField }) {
      return (
        <div>
          {/* WELCOME SCREEN VỚI LOGO VKS CHÍNH THỨC */}
          <div className="welcome-container">
            {/* Logo Viện Kiểm sát Nhân dân Việt Nam */}
            <img 
              src="logo_vks.png" 
              alt="Logo Viện Kiểm sát nhân dân Việt Nam" 
              className="welcome-logo"
              onClick={() => setTab('dashboard')}
              title="Quay về trang chủ"
            />

            {/* Dòng chữ 3D */}
            <div 
              className="welcome-title"
              onClick={() => setTab('dashboard')}
              style={{ cursor: 'pointer' }}
            >
              VIỆN KIỂM SÁT<br />NHÂN DÂN<br />THÀNH PHỐ CẦN THƠ
            </div>

            <div className="welcome-subtitle">
              Hệ thống tra cứu văn bản pháp luật và nghiệp vụ kiểm sát
            </div>

            <div className="welcome-divider"></div>

            <div style={{ color: '#a8c5e8', fontSize: '15px' }}>
              Chọn mục nghiệp vụ bên trái để bắt đầu tra cứu
            </div>
          </div>

          {/* Stats */}
          <div className="stat-grid">
            {[
              { lbl:"Văn bản pháp luật", val:DOCS.length, sub:`${DOCS.filter(d=>d.hieu==='Còn hiệu lực').length} còn hiệu lực`, c:"#C9A84C", icon:"📜" },
              { lbl:"Quy trình nghiệp vụ", val:QUYTRINH.length, sub:"Đang áp dụng", c:"#3498DB", icon:"📋" },
              { lbl:"Thông báo rút kinh nghiệm", val:RKN.length, sub:"VKSND các cấp", c:"#E74C3C", icon:"📢" },
              { lbl:"Án lệ", val:ANLE.length, sub:"TAND Tối cao", c:"#8E44AD", icon:"⚖️" },
            ].map((s,i) => (
              <div key={i} className="stat-box" style={{'--c':s.c}}>
                <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
                <div className="stat-val">{s.val}</div>
                <div className="stat-lbl">{s.lbl}</div>
                <div className="stat-sub">{s.sub}</div>
              </div>
            ))}
          </div>

          <div className="dash-two">
            <div className="card">
              <div className="section-title">
                📜 Văn bản mới nhất
                <span className="section-title-more" onClick={()=>setTab('vanbanluat')}>Xem tất cả →</span>
              </div>
              {DOCS.slice(0,6).map(doc => (
                <div key={doc.id} className="doc-item" onClick={()=>setTab('vanbanluat')}>
                  <div className="doc-item-icon" style={{background:`${LOAI_COLOR[doc.loai]||'#C9A84C'}18`}}>{doc.loai==='Bộ luật'||doc.loai==='Luật'?'📘':'📋'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="doc-item-title" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.soHieu} – {doc.tenVanBan}</div>
                    <div className="doc-item-meta">{doc.coQuan} · {doc.ngayBanHanh}</div>
                  </div>
                  <span className={doc.hieu==='Còn hiệu lực'?'badge badge-green':'badge badge-red'} style={{flexShrink:0}}>{doc.hieu==='Còn hiệu lực'?'HLực':'Hết HL'}</span>
                </div>
              ))}
            </div>

            <div className="card">
              <div className="section-title">📊 Phân bổ lĩnh vực</div>
              {LEGAL_FIELDS.slice(0,8).map(f => {
                const cnt = DOCS.filter(d=>d.linhVuc.includes(f.id)).length;
                return <div key={f.id} className="bar-item" onClick={()=>{setSelField(f.id);setTab('vanbanluat')}} style={{cursor:'pointer'}}>
                  <span style={{fontSize:14,width:22}}>{f.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#8A9BBF',marginBottom:3}}>
                      <span>{f.name}</span><span style={{color:f.color}}>{cnt}</span>
                    </div>
                    <div className="bar-track"><div className="bar-fill" style={{width:`${Math.max((cnt/DOCS.length)*100,8)}%`,background:f.color}} /></div>
                  </div>
                </div>;
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── VĂN BẢN PHÁP LUẬT (ĐÃ CẢI TIẾN) ────────────────────────
    function VanBanLuat({ selField, setSelField, notify }) {
      const [q, setQ] = useState('');
      const [loai, setLoai] = useState('Tất cả');
      const [hl, setHl] = useState('Tất cả');
      const [sel, setSel] = useState(null);

      const filtered = useMemo(() => DOCS.filter(d => {
        const mF = !selField || d.linhVuc.includes(selField);
        const mL = loai === 'Tất cả' || d.loai === loai;
        const mH = hl === 'Tất cả' || d.hieu === hl;
        const mQ = !q || [d.soHieu, d.tenVanBan, d.tomTat, d.coQuan].some(s => (s || '').toLowerCase().includes(q.toLowerCase()));
        return mF && mL && mH && mQ;
      }), [q, loai, hl, selField]);

      const openDocument = (doc, type = 'auto') => {
        if (type === 'pdf' || type === 'auto') {
          if (doc.link) { window.open(doc.link, '_blank'); notify('Đang mở văn bản từ nguồn chính thức...'); return; }
          if (doc.pdfLocal) { window.open(doc.pdfLocal, '_blank'); notify('Đang mở file PDF local'); return; }
        }
        if (type === 'chm' || type === 'auto') {
          if (doc.file) { openCHM(doc.file); notify('Đang mở trong CHM...'); return; }
        }
        notify('Chưa có link hoặc file cho văn bản này.', 'err');
      };

      const downloadDocument = (doc) => {
        const url = doc.pdfLocal || doc.link;
        if (!url) { notify('Không có file để tải.', 'err'); return; }
        const a = document.createElement('a');
        a.href = url;
        a.download = `${doc.soHieu.replace(/[\/\\]/g, '-')}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        notify('Đang tải văn bản...');
      };

      return <div>
        <div className="page-header">
          <div className="page-title">I. Hệ Thống Văn Bản Pháp Luật</div>
          <div className="page-sub">Tổng hợp Bộ luật, Luật, Nghị định, Thông tư và các văn bản quy phạm pháp luật</div>
          <div className="gold-line" />
        </div>

        <div className="field-grid">
          {LEGAL_FIELDS.map(f => {
            const cnt = DOCS.filter(d=>d.linhVuc.includes(f.id)).length;
            return <div key={f.id} className={`field-card${selField===f.id?' sel':''}`} onClick={()=>setSelField(selField===f.id?null:f.id)}>
              <div className="field-icon">{f.icon}</div>
              <div className="field-name">{f.name}</div>
              <div className="field-count" style={{color:f.color}}>{cnt} văn bản</div>
            </div>;
          })}
        </div>

        <div className="search-bar">
          <input className="search-input" placeholder="🔍 Nhập số hiệu, tên văn bản, từ khóa..." value={q} onChange={e=>setQ(e.target.value)} />
          <select className="filter-select" value={loai} onChange={e=>setLoai(e.target.value)}>
            {DOC_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
          <select className="filter-select" value={hl} onChange={e=>setHl(e.target.value)}>
            {DOC_STATUS.map(t=><option key={t}>{t}</option>)}
          </select>
          {selField && <button className="btn-sec" onClick={()=>setSelField(null)}>✕ Bỏ lọc lĩnh vực</button>}
        </div>

        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div className="tbl-head" style={{gridTemplateColumns:'2.2fr 1fr 1.1fr 1fr 80px 110px'}}>
            <div>Số hiệu / Tên văn bản</div><div>Loại</div><div>Cơ quan</div><div>Ngày ban hành</div><div>Hiệu lực</div><div style={{textAlign:'center'}}>Thao tác</div>
          </div>
          {filtered.length === 0
            ? <div style={{padding:'48px 0',textAlign:'center',color:'#3A4B6A'}}><div style={{fontSize:40,marginBottom:12}}>📭</div>Không tìm thấy văn bản phù hợp</div>
            : filtered.map(doc => (
              <div key={doc.id} className="tbl-row" style={{gridTemplateColumns:'2.2fr 1fr 1.1fr 1fr 80px 110px', alignItems:'center'}} onClick={()=>setSel(doc)}>
                <div>
                  <div className="tbl-title">{doc.soHieu}</div>
                  <div className="tbl-sub" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:340}}>{doc.tenVanBan}</div>
                </div>
                <div><span className={getBadgeClass(doc.loai)}>{doc.loai}</span></div>
                <div className="tbl-sub">{doc.coQuan}</div>
                <div className="tbl-sub">{doc.ngayBanHanh}</div>
                <div><span className={doc.hieu==='Còn hiệu lực'?'badge badge-green':'badge badge-red'}>{doc.hieu==='Còn hiệu lực'?'Hiệu lực':'Hết HL'}</span></div>
                <div style={{display:'flex',gap:6,justifyContent:'center'}} onClick={e=>e.stopPropagation()}>
                  <button className="btn-sec" style={{padding:'4px 10px',fontSize:11}} onClick={()=>openDocument(doc)}>Mở</button>
                  <button className="btn-ghost" style={{padding:'4px 8px',fontSize:11}} onClick={()=>downloadDocument(doc)} title="Tải PDF">⬇️</button>
                </div>
              </div>
            ))
          }
        </div>

        {sel && <div className="overlay" onClick={()=>setSel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:'#C9A84C',marginBottom:4}}>{sel.soHieu} {sel.nguon && `• ${sel.nguon}`}</div>
                <div className="modal-title" style={{fontSize:19,lineHeight:1.35}}>{sel.tenVanBan}</div>
                <div style={{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}}>
                  <span className={getBadgeClass(sel.loai)}>{sel.loai}</span>
                  <span className={sel.hieu==='Còn hiệu lực'?'badge badge-green':'badge badge-red'}>{sel.hieu}</span>
                  {sel.link && <span className="badge badge-blue">Có PDF chính thức</span>}
                  {sel.pdfLocal && <span className="badge badge-gold">Có file local</span>}
                  {sel.file && <span className="badge badge-purple">Có trong CHM</span>}
                </div>
              </div>
              <button onClick={()=>setSel(null)} style={{background:'none',border:'none',color:'#6A7A9B',fontSize:22,cursor:'pointer'}}>✕</button>
            </div>
            <div className="modal-sep" />
            <div className="modal-grid">
              {[['Cơ quan ban hành',sel.coQuan],['Ngày ban hành',sel.ngayBanHanh],['Ngày hiệu lực',sel.ngayHieuLuc||'—'],['Lĩnh vực',LEGAL_FIELDS.filter(f=>sel.linhVuc.includes(f.id)).map(f=>f.name).join(', ')]].map(([l,v])=>(
                <div key={l}><div className="modal-field-lbl">{l}</div><div className="modal-field-val">{v}</div></div>
              ))}
            </div>
            <div className="modal-field-lbl" style={{marginTop:8}}>Tóm tắt nội dung</div>
            <div style={{fontSize:14,lineHeight:1.75,color:'#B0A898',marginTop:6}}>{sel.tomTat || 'Chưa có tóm tắt chi tiết.'}</div>
            <div className="modal-actions" style={{marginTop:22,flexWrap:'wrap',gap:10}}>
              {(sel.link || sel.pdfLocal) && <button className="btn-primary" style={{flex:'1 1 auto',minWidth:220}} onClick={()=>openDocument(sel,'pdf')}>📄 {sel.link ? 'Xem toàn văn (PDF chính thức)' : 'Mở file PDF local'}</button>}
              {sel.file && <button className="btn-sec" style={{flex:'1 1 auto',minWidth:180}} onClick={()=>openDocument(sel,'chm')}>📂 Mở trong CHM</button>}
              {(sel.link || sel.pdfLocal) && <button className="btn-sec" onClick={()=>downloadDocument(sel)}>⬇️ Tải PDF</button>}
              <button className="btn-ghost" onClick={()=>setSel(null)}>Đóng</button>
            </div>
          </div>
        </div>}
      </div>;
    }

    // Các module khác giữ ngắn gọn
    function QuyTrinh({ notify }) { return <div><div className="page-header"><div className="page-title">II. Quy Trình Nghiệp Vụ Kiểm Sát</div></div><p style={{color:'#8A9BBF'}}>Module đang hoạt động bình thường.</p></div>; }
    function RutKinhNghiem({ notify }) { return <div><div className="page-header"><div className="page-title">III. Thông Báo Rút Kinh Nghiệm</div></div><p style={{color:'#8A9BBF'}}>Module đang hoạt động bình thường.</p></div>; }
    function AnLe({ notify }) { return <div><div className="page-header"><div className="page-title">IV. Án Lệ</div></div><p style={{color:'#8A9BBF'}}>Module đang hoạt động bình thường.</p></div>; }
    function CongVanNghiepVu({ notify }) { return <div><div className="page-header"><div className="page-title">📨 Văn Bản Nghiệp Vụ</div></div><p style={{color:'#8A9BBF'}}>Module đang hoạt động bình thường.</p></div>; }

    function TroLyAo({ notify }) {
      const [q, setQ] = useState('');
      const [res, setRes] = useState('');
      const [loading, setLoading] = useState(false);
      const SCENARIOS = ["Phân tích dấu hiệu pháp lý tội Nhận hối lộ theo Điều 354 BLHS 2015", "Tóm tắt điểm mới của Luật Đất đai 2024", "Phân biệt tội Cướp và Cưỡng đoạt tài sản"];
      const send = async () => {
        if (!q.trim()) return;
        setLoading(true);
        try {
          const r = await fetch("http://localhost:3000/api/chat", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ message: q }) });
          const d = await r.json();
          setRes(d.reply || 'Không có phản hồi.');
        } catch {
          setRes('Chưa kết nối được backend. Vui lòng chạy backend LEXVIET.');
        }
        setLoading(false);
      };
      return <div className="ai-wrap">
        <div className="page-header"><div className="page-title">🤖 Trợ Lý Pháp Lý AI</div></div>
        <div className="scenario-chips">{SCENARIOS.map((s,i)=><button key={i} className="chip" onClick={()=>setQ(s)}>{s}</button>)}</div>
        <div className="ai-input-area">
          <textarea className="ai-input" rows={3} placeholder="Nhập câu hỏi pháp lý..." value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} />
          <button className="ai-send" onClick={send} disabled={loading}>{loading ? 'Đang phân tích...' : 'Gửi'}</button>
        </div>
        {res && <div className="ai-response">{res}</div>}
      </div>;
    }

    function App() {
      const [tab, setTab] = useState('dashboard');
      const [selField, setSelField] = useState(null);
      const [notif, setNotif] = useState(null);
      const [showProfile, setShowProfile] = useState(false);
      const [userRole, setUserRole] = useState('Kiểm sát viên');

      const notify = (msg, type='ok') => setNotif({msg, type});

      const NAV = [
        { id:'dashboard', label:'Tổng quan', icon:'🏠' },
        { id:'vanbanluat', label:'Văn bản pháp luật', icon:'📜', badge: DOCS.length },
        { id:'quytrinh', label:'Quy trình nghiệp vụ', icon:'📋', badge: QUYTRINH.length },
        { id:'rutkn', label:'Rút kinh nghiệm', icon:'📢', badge: RKN.length },
        { id:'anle', label:'Án lệ', icon:'⚖️', badge: ANLE.length },
        { id:'congvan', label:'Văn bản nghiệp vụ', icon:'📨', badge: CONGVAN.length },
        { id:'trolyao', label:'Trợ lý AI', icon:'🤖' },
      ];

      return <div className="app">
        <style>{CSS}</style>

        <div className="topbar">
          <div className="topbar-logo" onClick={() => setTab('dashboard')}>
            <div className="topbar-logo-icon">⚖</div>
            <div>
              <div className="topbar-logo-text">VKSND TP. CẦN THƠ</div>
              <div className="topbar-logo-sub">HỆ THỐNG LUẬT - VĂN BẢN NGÀNH</div>
            </div>
          </div>
          <div className="topbar-ticker">
            <div className="topbar-ticker-inner">
              <span>Mới:</span> Hướng dẫn 04/2026/VKSTC &nbsp;·&nbsp; <span>Mới:</span> Luật Đất đai 2024 &nbsp;·&nbsp; <span>Mới:</span> Án lệ 61/2024/AL
            </div>
          </div>
          <div className="topbar-right">
            <button className="btn-trolyao" onClick={()=>setTab('trolyao')}>🤖 Trợ Lý AI</button>
            <div className="avatar-btn" onClick={()=>setShowProfile(!showProfile)}>
              <span style={{fontSize:20}}>👤</span>
              <div><div className="avatar-name">Nguyễn Hoàng Thiên Phúc</div><div className="avatar-role">{userRole}</div></div>
            </div>
          </div>
        </div>

        <div className="layout">
          <div className="sidebar">
            <div className="sidebar-section">
              <div className="sidebar-label">Menu chính</div>
              {NAV.map(n => (
                <button key={n.id} className={`nav-item${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)}>
                  <span className="nav-icon">{n.icon}</span>
                  <span>{n.label}</span>
                  {n.badge && <span className="nav-badge">{n.badge}</span>}
                </button>
              ))}
            </div>
            <div className="sidebar-divider" />
            <div className="sidebar-section">
              <div className="sidebar-label">Lĩnh vực nổi bật</div>
              {LEGAL_FIELDS.slice(0,8).map(f => (
                <button key={f.id} className={`nav-item${selField===f.id?' active':''}`} onClick={()=>{setSelField(selField===f.id?null:f.id);setTab('vanbanluat')}}>
                  <span className="nav-icon">{f.icon}</span>
                  <span style={{fontSize:12}}>{f.name}</span>
                </button>
              ))}
            </div>
            <div style={{flex:1}} />
            <div className="sidebar-footer">
              <div className="sidebar-footer-online">Đang kết nối CSDL</div>
              <div style={{fontSize:10,color:'#3A4B6A',marginTop:4}}>Cập nhật: 15/07/2026</div>
            </div>
          </div>

          <div className="main">
            {tab==='dashboard' && <Dashboard setTab={setTab} setSelField={setSelField} />}
            {tab==='vanbanluat' && <VanBanLuat selField={selField} setSelField={setSelField} notify={notify} />}
            {tab==='quytrinh' && <QuyTrinh notify={notify} />}
            {tab==='rutkn' && <RutKinhNghiem notify={notify} />}
            {tab==='anle' && <AnLe notify={notify} />}
            {tab==='congvan' && <CongVanNghiepVu notify={notify} />}
            {tab==='trolyao' && <TroLyAo notify={notify} />}
          </div>
        </div>

        {notif && <Notif key={Date.now()} msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)} />}
      </div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
