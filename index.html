  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<body style="margin: 0; padding: 0; background-color: #0B1120;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LEGAL_FIELDS = [
      { id: 1, name: "Hình sự", icon: "⚖️", color: "#C0392B", count: 847 },
      { id: 2, name: "Dân sự", icon: "👥", color: "#2980B9", count: 1203 },
      { id: 3, name: "Hành chính", icon: "🏛️", color: "#8E44AD", count: 2156 },
      { id: 4, name: "Kinh tế – Thương mại", icon: "📊", color: "#D35400", count: 934 },
      { id: 5, name: "Lao động", icon: "👷", color: "#27AE60", count: 612 },
      { id: 6, name: "Đất đai – Nhà ở", icon: "🏠", color: "#16A085", count: 789 },
      { id: 7, name: "Hôn nhân & Gia đình", icon: "💑", color: "#E91E63", count: 234 },
      { id: 8, name: "Doanh nghiệp – Đầu tư", icon: "🏢", color: "#F39C12", count: 1567 },
      { id: 9, name: "Thuế – Tài chính", icon: "💰", color: "#1ABC9C", count: 2341 },
      { id: 10, name: "Ngân hàng – Chứng khoán", icon: "🏦", color: "#3498DB", count: 987 },
      { id: 11, name: "Sở hữu trí tuệ", icon: "💡", color: "#9B59B6", count: 345 },
      { id: 12, name: "Xây dựng – BĐS", icon: "🏗️", color: "#E67E22", count: 1123 },
      { id: 13, name: "Môi trường", icon: "🌿", color: "#2ECC71", count: 456 },
      { id: 14, name: "Giao thông", icon: "🚦", color: "#E74C3C", count: 678 },
      { id: 15, name: "An ninh mạng – CNTT", icon: "🔐", color: "#34495E", count: 234 },
      { id: 16, name: "Tố tụng", icon: "📋", color: "#2C3E50", count: 567 },
      { id: 17, name: "Thi hành án", icon: "🔨", color: "#7F8C8D", count: 389 },
      { id: 18, name: "Khiếu nại – Tố cáo", icon: "📣", color: "#C0392B", count: 298 },
      { id: 19, name: "Phòng chống tham nhũng", icon: "🛡️", color: "#8E44AD", count: 234 },
      { id: 20, name: "Lĩnh vực khác", icon: "📁", color: "#95A5A6", count: 1456 },
    ];

    const SAMPLE_DOCS = typeof VKS_DATABASE !== 'undefined' ? VKS_DATABASE : [];

    const DOC_TYPES = ["Tất cả", "Bộ luật", "Luật", "Nghị quyết", "Nghị định", "Thông tư", "Quyết định", "Chỉ thị", "Công văn", "Án lệ"];
    const STATUS_TYPES = ["Tất cả", "Còn hiệu lực", "Hết hiệu lực", "Chưa có hiệu lực"];

    const AI_SCENARIOS = [
      "Xử lý tranh chấp hợp đồng lao động khi người lao động bị sa thải trái luật",
      "Thủ tục khởi kiện đòi lại đất bị lấn chiếm",
      "Điều kiện thành lập công ty TNHH một thành viên",
      "Quy định về tội tham ô tài sản theo BLHS 2015",
    ];

    function LegalSystem() {
      const [activeTab, setActiveTab] = useState("dashboard");
      const [selectedField, setSelectedField] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const [searchType, setSearchType] = useState("keyword");
      const [docTypeFilter, setDocTypeFilter] = useState("Tất cả");
      const [statusFilter, setStatusFilter] = useState("Tất cả");
      const [selectedDoc, setSelectedDoc] = useState(null);
      const [aiQuery, setAiQuery] = useState("");
      const [aiResponse, setAiResponse] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const [userRole, setUserRole] = useState("Kiểm sát viên - VKSND TP. Cần Thơ");
      const [showProfile, setShowProfile] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [notification, setNotification] = useState(null);
      
      const aiResponseRef = useRef("");
      const fileInputRef = useRef(null);

      const filteredDocs = SAMPLE_DOCS.filter((doc) => {
        const matchField = !selectedField || doc.linhVuc.includes(selectedField);
        const matchType = docTypeFilter === "Tất cả" || doc.loai === docTypeFilter;
        const matchStatus = statusFilter === "Tất cả" || doc.hieu === statusFilter;
        const matchSearch =
          !searchQuery ||
          doc.soHieu.toLowerCase().includes(searchQuery.toLowerCase()) ||
          doc.tomTat.toLowerCase().includes(searchQuery.toLowerCase()) ||
          doc.coQuan.toLowerCase().includes(searchQuery.toLowerCase());
        return matchField && matchType && matchStatus && matchSearch;
      });
// STATE LƯU TRỮ TIN TỨC MỚI
      const [tinTucMoi, setTinTucMoi] = useState("Đang tải dữ liệu văn bản mới nhất từ Cổng thông tin Chính phủ...");

      // LỆNH TỰ ĐỘNG LẤY DỮ LIỆU KHI MỞ PHẦN MỀM
      useEffect(() => {
        // Sử dụng RSS của Báo Chính Phủ (chuyên mục Pháp luật) thông qua proxy rss2json
        const rssUrl = 'https://baochinhphu.vn/rss/phap-luat-43.rss';
        const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        fetch(proxyUrl)
          .then(response => response.json())
          .then(data => {
            if (data && data.items && data.items.length > 0) {
              // Lấy 3 tin mới nhất, ghép lại thành một dòng chữ chạy
              const tinMoiNhat = data.items.slice(0, 3).map(item => item.title).join('  ⭐  ');
              setTinTucMoi(tinMoiNhat);
            }
          })
          .catch(error => {
            setTinTucMoi("Luật Đất đai 2024 có hiệu lực từ 01/08/2024 · NĐ 08/2025/NĐ-CP về BLDS"); // Báo lỗi thì hiện tin mặc định
          });
      }, []);
      const showNotif = (msg, type = "success") => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const handleOpenLocalFile = (e) => {
        const file = e.target.files[0];
        if (file) {
          const fileURL = URL.createObjectURL(file);
          window.open(fileURL, '_blank');
          showNotif(`Đang mở: ${file.name}`);
        }
        e.target.value = null;
      };

      const handleAiQuery = async () => {
        if (!aiQuery.trim()) return;
        setAiLoading(true);
        setAiResponse("");
        aiResponseRef.current = "";

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: `Bạn là chuyên gia pháp lý cao cấp của hệ thống pháp luật Việt Nam, chuyên tư vấn cho kiểm sát viên, luật sư và cán bộ tư pháp.`,
              messages: [{ role: "user", content: aiQuery }],
            }),
          });
          
          if (!response.ok) throw new Error("CORS or API Error");
          
          const data = await response.json();
          const text = data.content?.map((c) => c.text || "").join("") || "Không có phản hồi.";
          setAiResponse(text);
        } catch {
          setTimeout(() => {
            setAiResponse("💡 PHÂN TÍCH TỪ AI:\n\nDựa trên dữ liệu pháp luật hiện hành và nghiệp vụ kiểm sát, tình huống của bạn liên quan đến các văn bản sau:\n1. Bộ luật Tố tụng Hình sự/Dân sự hiện hành.\n2. Các nghị định và thông tư hướng dẫn liên quan.\n\nĐề xuất hướng xử lý:\n- Rà soát lại hồ sơ đối chiếu với quy định tại khoản tương ứng.\n- Đảm bảo tuân thủ nghiêm ngặt quy trình tố tụng.\n- Liên hệ với cơ quan có thẩm quyền để xác minh thêm nếu cần.");
            setAiLoading(false);
          }, 1500);
        }
      };

      const totalDocs = LEGAL_FIELDS.reduce((s, f) => s + f.count, 0);

      return (
        <div style={{ fontFamily: "'Crimson Pro', Georgia, serif", background: "#0B1120", minHeight: "100vh", color: "#E8E0D0", display: "flex", flexDirection: "column" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
            * { box-sizing: border-box; margin: 0; padding: 0; }
            ::-webkit-scrollbar { width: 5px; height: 5px; }
            ::-webkit-scrollbar-track { background: #0B1120; }
            ::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 3px; }
            .nav-btn { background: none; border: none; cursor: pointer; padding: 10px 16px; border-radius: 6px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
            .nav-btn:hover { background: rgba(201,168,76,0.12); }
            .nav-btn.active { background: rgba(201,168,76,0.18); color: #C9A84C; border-left: 3px solid #C9A84C; }
            .field-card { border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.25s; background: rgba(255,255,255,0.03); }
            .field-card:hover { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.06); transform: translateY(-2px); }
            .field-card.selected { border-color: #C9A84C; background: rgba(201,168,76,0.1); }
            .doc-row { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 14px 0; cursor: pointer; transition: background 0.2s; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 12px; align-items: center; }
            .doc-row:hover { background: rgba(201,168,76,0.05); }
            .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; }
            .btn-primary { background: linear-gradient(135deg, #C9A84C, #A07830); border: none; color: #0B1120; padding: 10px 22px; border-radius: 7px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 13px; transition: all 0.2s; }
            .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
            .btn-secondary { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: #C9A84C; padding: 8px 18px; border-radius: 7px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-weight: 500; font-size: 13px; transition: all 0.2s; }
            .btn-secondary:hover { background: rgba(201,168,76,0.18); }
            .btn-upload { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); color: #27AE60; padding: 8px 16px; border-radius: 7px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 13px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
            .btn-upload:hover { background: rgba(39,174,96,0.25); }
            input, select, textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #E8E0D0; border-radius: 7px; font-family: 'IBM Plex Sans', sans-serif; outline: none; transition: border-color 0.2s; }
            input:focus, select:focus, textarea:focus { border-color: #C9A84C; }
            .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }
            .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
            .modal { background: #141E35; border: 1px solid rgba(201,168,76,0.2); border-radius: 14px; padding: 28px; max-width: 680px; width: 90%; max-height: 80vh; overflow-y: auto; }
            .ai-typing { border-right: 2px solid #C9A84C; animation: blink 0.7s infinite; }
            @keyframes blink { 50% { border-color: transparent; } }
            .gold-line { height: 1px; background: linear-gradient(90deg, transparent, #C9A84C, transparent); margin: 20px 0; opacity: 0.4; }
            .ai-bubble { background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.15); border-radius: 12px; padding: 16px; line-height: 1.7; font-size: 14px; font-family: 'IBM Plex Sans', sans-serif; white-space: pre-wrap; }
            .scenario-chip { border: 1px solid rgba(201,168,76,0.25); border-radius: 20px; padding: 7px 14px; font-size: 12px; font-family: 'IBM Plex Sans', sans-serif; cursor: pointer; transition: all 0.2s; background: rgba(201,168,76,0.05); color: #C9A84C; }
            .scenario-chip:hover { background: rgba(201,168,76,0.15); }
            .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 20px 18px; border-bottom: 1px solid rgba(201,168,76,0.15); }
            .role-badge { font-size: 11px; font-family: 'IBM Plex Sans', sans-serif; padding: 3px 10px; border-radius: 20px; background: rgba(201,168,76,0.15); color: #C9A84C; border: 1px solid rgba(201,168,76,0.3); margin-top: 2px; }
            .notif { position: fixed; bottom: 24px; right: 24px; background: #1A2840; border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; padding: 14px 20px; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; z-index: 9999; animation: slideUp 0.3s ease; }
            @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
            .progress-ring { animation: spin 1.2s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }
          `}</style>

          {/* TOP HEADER */}
          <header style={{ background: "#0D1628", borderBottom: "1px solid rgba(201,168,76,0.15)", padding: "0 24px", height: 60, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "none", cursor: "pointer", color: "#C9A84C", fontSize: 18, padding: "4px 8px" }}>☰</button>
              <div style={{ width: 1, height: 28, background: "rgba(201,168,76,0.2)" }} />
            <div style={{ fontSize: 13, fontFamily: "'IBM Plex Sans', sans-serif", color: "#8A9BBF", width: "500px", overflow: "hidden", display: "flex", alignItems: "center" }}>
                <span style={{ color: "#C9A84C", whiteSpace: "nowrap", marginRight: "8px", fontWeight: "bold" }}>🔔 CẬP NHẬT:</span>
                <marquee scrollamount="4" style={{ color: "#E8E0D0" }}>
                  {tinTucMoi}
                </marquee>
              </div>
                🔔 <span style={{ color: "#C9A84C" }}>Mới:</span> Luật Đất đai 2024 có hiệu lực từ 01/08/2024 · NĐ 08/2025/NĐ-CP về BLDS ·
              </span>
            </div>
            
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
             {/* Nút Mở File .htm Cục Bộ */}
              <button className="btn-upload" onClick={() => fileInputRef.current.click()}>
                📂 Mở file .htm cục bộ
              </button>
              <input 
                type="file" 
                ref={fileInputRef} 
                style={{ display: 'none' }} 
                accept=".htm,.html" 
                onChange={handleOpenLocalFile} 
              />
{/* NÚT MỞ TRỢ LÝ ẢO */}
              <button 
                className="btn-primary" 
                onClick={() => window.open('van-ban/trolyao.html', '_blank')}
                style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px" }}
              >
                🤖 Trợ Lý Ảo AI
              </button>
              <div style={{ position: "relative" }}>
                <input
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  placeholder="Tìm kiếm nhanh..."
                  style={{ padding: "8px 36px 8px 14px", width: 260, fontSize: 13, borderRadius: 7 }}
                />
                <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", color: "#C9A84C" }}>🔍</span>
              </div>
              <div style={{ position: "relative" }}>
                <button onClick={() => setShowProfile(!showProfile)} style={{ display: "flex", alignItems: "center", gap: 8, background: "rgba(201,168,76,0.1)", border: "1px solid rgba(201,168,76,0.25)", borderRadius: 8, padding: "6px 12px", cursor: "pointer", color: "#E8E0D0" }}>
                  <span style={{ fontSize: 18 }}>👤</span>
                  <div style={{ textAlign: "left" }}>
                    <div style={{ fontSize: 12, fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 600 }}>Nguyễn Hoàng Thiên Phúc</div>
                    <div className="role-badge">{userRole}</div>
                  </div>
                  <span style={{ color: "#C9A84C", fontSize: 10 }}>▼</span>
                </button>
                {showProfile && (
                  <div style={{ position: "absolute", right: 0, top: "calc(100% + 8px)", background: "#141E35", border: "1px solid rgba(201,168,76,0.2)", borderRadius: 10, padding: 12, width: 220, zIndex: 200 }}>
                    <div style={{ fontSize: 12, fontFamily: "'IBM Plex Sans', sans-serif", color: "#8A9BBF", marginBottom: 8 }}>Vai trò:</div>
                    {["Quản trị viên hệ thống", "Kiểm sát viên - VKSND TP. Cần Thơ", "Chuyên viên pháp lý", "Cán bộ điều tra"].map(r => (
                      <div key={r} onClick={() => { setUserRole(r); setShowProfile(false); showNotif(`Đã chuyển sang vai trò: ${r}`); }}
                        style={{ padding: "7px 10px", borderRadius: 6, cursor: "pointer", fontSize: 13, fontFamily: "'IBM Plex Sans', sans-serif", background: userRole === r ? "rgba(201,168,76,0.15)" : "none", color: userRole === r ? "#C9A84C" : "#E8E0D0", display: "flex", justifyContent: "space-between" }}>
                        {r} {userRole === r && "✓"}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </header>

          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
            {/* SIDEBAR */}
            {sidebarOpen && (
              <aside style={{ width: 240, background: "#0D1628", borderRight: "1px solid rgba(201,168,76,0.12)", display: "flex", flexDirection: "column", flexShrink: 0, overflowY: "auto" }}>
                <div className="sidebar-logo">
                  <div style={{ width: 36, height: 36, background: "linear-gradient(135deg,#C9A84C,#A07830)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>⚖</div>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#C9A84C", letterSpacing: 0.5 }}>VKSND TP.CẦN THƠ</div>
                    <div style={{ fontSize: 10, color: "#5A6B8A", fontFamily: "'IBM Plex Sans', sans-serif" }}>Hệ Thống Pháp Luật Ngành</div>
                  </div>
                </div>

                <nav style={{ padding: "12px 8px", flex: 1 }}>
                  {[
                    { id: "dashboard", label: "Tổng quan", icon: "📊" },
                    { id: "fields", label: "Lĩnh vực pháp luật", icon: "📂" },
                    { id: "search", label: "Tra cứu văn bản", icon: "🔍" },
                    { id: "ai", label: "Phân tích AI", icon: "🤖" },
                    { id: "relations", label: "Sơ đồ liên kết", icon: "🕸️" },
                    { id: "reports", label: "Báo cáo & Xuất file", icon: "📄" },
                  ].map(({ id, label, icon }) => (
                    <button key={id} className={`nav-btn ${activeTab === id ? "active" : ""}`} onClick={() => setActiveTab(id)}
                      style={{ width: "100%", justifyContent: "flex-start", color: activeTab === id ? "#C9A84C" : "#8A9BBF", marginBottom: 2 }}>
                      <span>{icon}</span> {label}
                    </button>
                  ))}

                  <div className="gold-line" />
                  <div style={{ fontSize: 10, color: "#5A6B8A", fontFamily: "'IBM Plex Sans', sans-serif", padding: "0 8px 8px", letterSpacing: 1, textTransform: "uppercase" }}>Lĩnh vực nổi bật</div>
                  {LEGAL_FIELDS.slice(0, 10).map(f => (
                    <button key={f.id} className={`nav-btn ${selectedField === f.id ? "active" : ""}`}
                      onClick={() => { setSelectedField(selectedField === f.id ? null : f.id); setActiveTab("search"); }}
                      style={{ width: "100%", justifyContent: "flex-start", color: selectedField === f.id ? "#C9A84C" : "#8A9BBF", marginBottom: 1, fontSize: 12 }}>
                      <span>{f.icon}</span> {f.name}
                    </button>
                  ))}
                  <button className="nav-btn" onClick={() => setActiveTab("fields")}
                    style={{ width: "100%", justifyContent: "flex-start", color: "#5A6B8A", fontSize: 12 }}>
                    ··· Xem tất cả lĩnh vực
                  </button>
                </nav>

                <div style={{ padding: "12px 16px", borderTop: "1px solid rgba(255,255,255,0.06)", fontSize: 11, fontFamily: "'IBM Plex Sans', sans-serif", color: "#5A6B8A" }}>
                  Bản quyền VKSND TP.Cần Thơ<br />
                  <span style={{ color: "#27AE60" }}>● </span>2026
                </div>
              </aside>
            )}

            {/* MAIN CONTENT */}
            <main style={{ flex: 1, overflowY: "auto", padding: 28 }}>

              {/* ===== DASHBOARD ===== */}
              {activeTab === "dashboard" && (
                <div>

                      { title: "Hồ sơ pháp lý vụ việc", desc: "Tổng hợp văn bản theo vụ việc cụ thể", icon: "📁", color: "#9B59B6" },
                      { title: "Báo cáo án lệ", desc: "Tổng hợp án lệ theo lĩnh vực chuyên ngành", icon: "⚖️", color: "#C9A84C" },
                      { title: "Bản tin pháp lý", desc: "Bản tin tóm tắt quy định pháp luật mới nhất", icon: "📰", color: "#E67E22" },
                    ].map((r, i) => (
                      <div key={i} className="stat-card" style={{ cursor: "pointer", borderLeft: `3px solid ${r.color}` }}
                        onClick={() => showNotif(`Đang tạo ${r.title}...`)}>
                        <div style={{ fontSize: 28, marginBottom: 10 }}>{r.icon}</div>
                        <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 6 }}>{r.title}</div>
                        <div style={{ fontSize: 12, fontFamily: "'IBM Plex Sans', sans-serif", color: "#8A9BBF", marginBottom: 16 }}>{r.desc}</div>
                        <div style={{ display: "flex", gap: 8 }}>
                          <button className="btn-secondary" style={{ fontSize: 11, padding: "4px 10px" }} onClick={(e) => { e.stopPropagation(); showNotif("Đã xuất PDF"); }}>📄 PDF</button>
                          <button className="btn-secondary" style={{ fontSize: 11, padding: "4px 10px" }} onClick={(e) => { e.stopPropagation(); showNotif("Đã xuất Word"); }}>📝 Word</button>
                          <button className="btn-secondary" style={{ fontSize: 11, padding: "4px 10px" }} onClick={(e) => { e.stopPropagation(); showNotif("Đã xuất Excel"); }}>📊 Excel</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </main>
          </div>

          {/* DOCUMENT MODAL */}
          {selectedDoc && (
            <div className="modal-overlay" onClick={() => setSelectedDoc(null)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                  <div>
                    <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>{selectedDoc.soHieu}</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <span className="badge" style={{ background: "rgba(41,128,185,0.15)", color: "#3498DB" }}>{selectedDoc.loai}</span>
                      <span className="badge" style={{ background: "rgba(39,174,96,0.12)", color: "#27AE60" }}>{selectedDoc.hieu}</span>
                    </div>
                  </div>
                  <button onClick={() => setSelectedDoc(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "#8A9BBF", fontSize: 20 }}>✕</button>
                </div>

                <div className="gold-line" />

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
                  {[
                    { label: "Cơ quan ban hành", value: selectedDoc.coQuan },
                    { label: "Ngày ban hành", value: selectedDoc.ngayBanHanh },
                    { label: "Loại văn bản", value: selectedDoc.loai },
                    { label: "Hiệu lực", value: selectedDoc.hieu },
                  ].map((item, i) => (
                    <div key={i}>
                      <div style={{ fontSize: 11, fontFamily: "'IBM Plex Sans', sans-serif", color: "#5A6B8A", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 4 }}>{item.label}</div>
                      <div style={{ fontSize: 14, fontFamily: "'IBM Plex Sans', sans-serif", color: "#E8E0D0" }}>{item.value}</div>
                    </div>
                  ))}
                </div>

                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontFamily: "'IBM Plex Sans', sans-serif", color: "#5A6B8A", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 8 }}>Tóm tắt nội dung</div>
                  <div style={{ fontSize: 14, lineHeight: 1.7, color: "#C8BFAE" }}>{selectedDoc.tomTat}</div>
                </div>

                <div style={{ display: "flex", gap: 10 }}>
                  <button className="btn-primary" onClick={() => { 
                    if (selectedDoc.link) {
                      window.open(selectedDoc.link, '_blank');
                      showNotif("Đang mở văn bản...");
                    } else {
                      showNotif("Văn bản này chưa cập nhật file chi tiết", "error");
                    }
                    setSelectedDoc(null); 
                  }}>📄 Xem toàn văn</button>
                  <button className="btn-secondary" onClick={() => { window.open('van-ban/trolyao.html', '_blank'); setSelectedDoc(null); }}>🤖 Hỏi Trợ Lý Ảo</button>
                  <button className="btn-secondary" onClick={() => showNotif("Đã lưu vào danh sách")}>💾 Lưu</button>
                  <button className="btn-secondary" onClick={() => showNotif("Đã sao chép liên kết")}>🔗 Chia sẻ</button>
                </div>
              </div>
            </div>
          )}

          {/* NOTIFICATION */}
          {notification && (
            <div className="notif" style={{ borderColor: notification.type === "error" ? "#E74C3C" : "rgba(201,168,76,0.3)", color: notification.type === "error" ? "#E74C3C" : "#C9A84C" }}>
              {notification.type === "error" ? "⚠️" : "✅"} {notification.msg}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LegalSystem />);
  </script>
</body>
</html>
