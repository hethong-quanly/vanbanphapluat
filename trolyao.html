<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trợ Lý Ảo VKSND TP.CẦN THƠ</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
    
    body {
      background-color: #0B1120;
      color: #E8E0D0;
      font-family: 'IBM Plex Sans', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Thanh Header */
    .header {
      background: #0D1628;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #C9A84C, #A07830);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #0B1120;
    }

    .btn-close {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8A9BBF;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: rgba(201,168,76,0.1);
      color: #C9A84C;
      border-color: rgba(201,168,76,0.3);
    }

    /* Khu vực Chat */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-wrapper {
      max-width: 850px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-user {
      align-self: flex-end;
    }

    .msg-ai {
      align-self: flex-start;
    }

    .msg-sender {
      font-size: 11px;
      color: #8A9BBF;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .msg-user .msg-sender {
      text-align: right;
      color: #C9A84C;
    }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: normal; /* Cho phép render HTML chuẩn */
      word-wrap: break-word;
    }

    /* CSS bổ sung cho render Markdown (in đậm, danh sách) của AI */
    .msg-bubble strong { font-weight: 600; color: #fff; }
    .msg-bubble ul { padding-left: 20px; margin: 8px 0; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble p { margin-top: 0; margin-bottom: 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }

    .msg-user .msg-bubble {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      color: #E8E0D0;
      border-bottom-right-radius: 4px;
    }

    .msg-ai .msg-bubble {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: #C8BFAE;
      border-bottom-left-radius: 4px;
    }

    /* Gợi ý tình huống */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .suggestion-chip {
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      color: #C9A84C;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: rgba(201,168,76,0.15);
    }

    /* Khu vực Nhập liệu */
    .input-area {
      background: #0D1628;
      border-top: 1px solid rgba(201,168,76,0.15);
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .input-box {
      max-width: 850px;
      width: 100%;
      display: flex;
      gap: 12px;
      position: relative;
    }

    .input-field {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #E8E0D0;
      padding: 14px 18px;
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 24px;
      overflow-y: hidden;
    }

    .input-field:focus {
      border-color: #C9A84C;
      background: rgba(255,255,255,0.08);
    }

    .btn-send {
      background: linear-gradient(135deg, #C9A84C, #A07830);
      border: none;
      color: #0B1120;
      padding: 0 24px;
      border-radius: 8px;
      font-weight: 600;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-send:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-send:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #C9A84C;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.5); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">
      <div class="ai-icon">🤖</div>
      <div>
        <div style="font-size: 15px; font-weight: 600; color: #E8E0D0;">Trợ Lý Ảo Pháp Lý</div>
        <div id="connection-status" style="font-size: 12px; color: #8A9BBF; margin-top: 2px;">Hệ thống văn bản - Đang kết nối dữ liệu...</div>
      </div>
    </div>
    <button class="btn-close" onclick="window.close()">✕ Đóng Cửa Sổ</button>
  </header>

  <div class="chat-container" id="chatContainer">
    <div class="chat-wrapper" id="chatWrapper">
      
      <div class="message msg-ai" id="welcome-msg">
        <div class="msg-sender">AI ASSISTANT</div>
        <div class="msg-bubble">Xin chào đồng chí! Tôi là Trợ lý ảo AI được thiết kế riêng để hỗ trợ nghiệp vụ Kiểm sát, được trợ lực bởi Groq AI.
        
Đang khởi tạo kết nối an toàn tới cơ sở dữ liệu VKSND... Vui lòng chờ trong giây lát.</div>
      </div>

    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea 
        id="userInput" 
        class="input-field" 
        placeholder="Hệ thống đang khởi động..." 
        onkeydown="handleKeyPress(event)"
        disabled
      ></textarea>
      <button id="sendBtn" class="btn-send" onclick="sendMessage()" disabled>
        <span>Gửi</span> ↗
      </button>
    </div>
  </div>

    const connectionStatus = document.getElementById('connection-status');
