<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKSND TP.Cần Thơ - Trợ Lý Ảo</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
    
    body {
      background-color: #0B1120;
      color: #E8E0D0;
      font-family: 'IBM Plex Sans', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Thanh Header */
    .header {
      background: #0D1628;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #C9A84C, #A07830);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #0B1120;
    }

    .status-text {
      font-size: 12px; 
      color: #8A9BBF; 
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #fbbf24; /* Loading */
    }
    .status-dot.ok { background: #4ade80; box-shadow: 0 0 0 2px rgba(74,222,128,0.2); }
    .status-dot.error { background: #f87171; }

    .btn-close {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8A9BBF;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: rgba(201,168,76,0.1);
      color: #C9A84C;
      border-color: rgba(201,168,76,0.3);
    }

    /* Khu vực Chat */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-wrapper {
      max-width: 850px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-user { align-self: flex-end; }
    .msg-ai { align-self: flex-start; }

    .msg-sender {
      font-size: 11px;
      color: #8A9BBF;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .msg-user .msg-sender {
      text-align: right;
      color: #C9A84C;
    }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
    }

    .msg-user .msg-bubble {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      color: #E8E0D0;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .msg-ai .msg-bubble {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: #C8BFAE;
      border-bottom-left-radius: 4px;
    }

    /* AI Formatting */
    .msg-ai .msg-bubble strong { color: #C9A84C; font-weight: 600; }
    .msg-ai .msg-bubble ul, .msg-ai .msg-bubble ol { margin: 8px 0; padding-left: 20px; }
    .msg-ai .msg-bubble li { margin-bottom: 4px; }

    /* Gợi ý tình huống */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .suggestion-chip {
      background: rgba(201,168,76,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      color: #C9A84C;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: rgba(201,168,76,0.15);
    }
    .suggestion-chip:disabled {
      opacity: 0.5; cursor: not-allowed;
    }

    /* Khu vực Nhập liệu */
    .input-area {
      background: #0D1628;
      border-top: 1px solid rgba(201,168,76,0.15);
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .input-box {
      max-width: 850px;
      width: 100%;
      display: flex;
      gap: 12px;
      position: relative;
    }

    .input-field {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #E8E0D0;
      padding: 14px 18px;
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 24px;
      overflow-y: hidden;
    }

    .input-field:focus {
      border-color: #C9A84C;
      background: rgba(255,255,255,0.08);
    }
    .input-field:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-send {
      background: linear-gradient(135deg, #C9A84C, #A07830);
      border: none;
      color: #0B1120;
      padding: 0 24px;
      border-radius: 8px;
      font-weight: 600;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-send:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #C9A84C;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.5); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">
      <div class="ai-icon">🤖</div>
      <div>
        <div style="font-size: 15px; font-weight: 600; color: #E8E0D0;">Trợ Lý Ảo VKSND</div>
        <div class="status-text" id="headerStatus">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusMessage">Đang khởi tạo hệ thống...</span>
        </div>
      </div>
    </div>
    <button class="btn-close" onclick="window.close()">✕ Đóng Cửa Sổ</button>
  </header>

  <div class="chat-container" id="chatContainer">
    <div class="chat-wrapper" id="chatWrapper">
      </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea 
        id="userInput" 
        class="input-field" 
        placeholder="Vui lòng chờ, đang kết nối AI..." 
        onkeydown="handleKeyPress(event)"
        disabled
      ></textarea>
      <button id="sendBtn" class="btn-send" onclick="sendMessage()" disabled>
        <span>Gửi</span> ↗
      </button>
    </div>
  </div>

  <script>
    // ===== CẤU HÌNH FIREBASE =====
    var firebaseConfig = {
        apiKey: "AIzaSyDunRDIeyBTVXTODoO22ywk1Q35cCx2sV8",
        authDomain: "dansu-vksndtpct.firebaseapp.com",
        databaseURL: "https://dansu-vksndtpct-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "dansu-vksndtpct",
        storageBucket: "dansu-vksndtpct.firebasestorage.app",
        appId: "1:843158256686:web:eb128d64c8b9bfd7aef3bf"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    // Biến toàn cục
    let GROQ_KEY = '';
    let isSending = false;

    // Các phần tử DOM
    const chatWrapper = document.getElementById('chatWrapper');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusMessage = document.getElementById('statusMessage');

    // ===== KHỞI TẠO ỨNG DỤNG =====
    async function initApp() {
        try {
            const snap = await db.ref('config/groq_key').once('value');
            const key = snap.val();

            if (!key) {
                setAppStatus('error', 'Chưa có API Key. Vui lòng thiết lập cấu hình.');
                showWelcomeMessage(false);
                return;
            }

            GROQ_KEY = key;
            setAppStatus('ok', 'Hệ thống AI đã sẵn sàng (Llama 3.3)');
            
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = "Nhập câu hỏi, tra cứu luật, hoặc yêu cầu phân tích dữ liệu...";
            
            showWelcomeMessage(true);

        } catch(e) {
            setAppStatus('error', 'Lỗi kết nối CSDL: ' + e.message);
            showWelcomeMessage(false);
        }
    }

    function setAppStatus(state, message) {
        statusDot.className = 'status-dot ' + state;
        statusMessage.innerText = message;
    }

    function showWelcomeMessage(isSuccess) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message msg-ai';
        
        let content = '';
        if (isSuccess) {
            content = `Xin chào đồng chí! Tôi là Trợ lý ảo AI được thiết kế riêng để hỗ trợ nghiệp vụ Kiểm sát, vận hành bởi **Groq AI (Llama 3.3)**.
            
Tôi có thể giúp đồng chí:
• **Phân tích dữ liệu hệ thống** (Án Dân sự, Thi hành án, Khiếu tố).
• **Tra cứu nhanh** các văn bản quy phạm pháp luật (BLDS, BLTTDS, v.v.).
• **Đề xuất hướng xử lý** hoặc rút kinh nghiệm nghiệp vụ.

Đồng chí cần hỗ trợ vấn đề gì hôm nay?`;
        } else {
            content = `Hệ thống tạm thời không thể kết nối tới máy chủ AI. Vui lòng kiểm tra lại cấu hình API hoặc mạng Internet.`;
        }

        msgDiv.innerHTML = `
            <div class="msg-sender">AI ASSISTANT</div>
            <div class="msg-bubble">${fmt(content)}</div>
            ${isSuccess ? `
            <div class="suggestions">
              <button class="suggestion-chip" onclick="fillInput('Phân tích số liệu hệ thống hôm nay và đưa ra nhận xét')">Phân tích dữ liệu hôm nay</button>
              <button class="suggestion-chip" onclick="fillInput('Tổng hợp phân tích số liệu tháng này, so sánh tổng thể')">Thống kê án tháng này</button>
              <button class="suggestion-chip" onclick="fillInput('Phân tích rủi ro vi phạm thời hạn tố tụng trong án DS, THA')">Hồ sơ quá hạn / Vi phạm</button>
              <button class="suggestion-chip" onclick="fillInput('Thời hạn thụ lý và xét xử dân sự theo BLTTDS 2015 là bao lâu?')">Tra cứu thời hạn thụ lý</button>
            </div>` : ''}
        `;
        chatWrapper.appendChild(msgDiv);
    }

    // ===== LẤY DỮ LIỆU FIREBASE (Context) =====
    async function fetchSystemData() {
        const today = new Date(); today.setHours(0,0,0,0);
        const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).getTime();
        const todayTs = today.getTime();

        async function get(path) {
            const snap = await db.ref(path).once('value');
            return Object.values(snap.val() || {});
        }

        const [ads, tha, dkt] = await Promise.all([get('an_dan_su'), get('thi_hanh_an'), get('don_khieu_to')]);
        const capCount = {};
        ads.forEach(x => { const c = x.cap_thu_ly || 'Khác'; capCount[c] = (capCount[c]||0)+1; });

        return {
            tong: { an: ads.length, tha: tha.length, dkt: dkt.length },
            homNay: { an: ads.filter(x=>(x.timestamp||0)>=todayTs).length, tha: tha.filter(x=>(x.timestamp||0)>=todayTs).length, dkt: dkt.filter(x=>(x.timestamp||0)>=todayTs).length },
            thang: { an: ads.filter(x=>(x.timestamp||0)>=monthStart).length, tha: tha.filter(x=>(x.timestamp||0)>=monthStart).length, dkt: dkt.filter(x=>(x.timestamp||0)>=monthStart).length },
            phanLoai: Object.entries(capCount).map(([k,v])=>`${k}: ${v} vụ`).join(', ') || 'Chưa có dữ liệu'
        };
    }

    // ===== GỌI API GROQ =====
    async function callGroq(question, context = '') {
        const systemPrompt = `Bạn là Trợ lý ảo của Viện Kiểm sát Nhân dân, chuyên nghiệp về kiểm sát dân sự. Trả lời bằng tiếng Việt, ngắn gọn, súc tích, chính xác. Trích dẫn điều luật cụ thể khi cần thiết. 
${context ? '\n===DỮ LIỆU HỆ THỐNG===\n' + context + '\n===================' : ''}`;

        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${GROQ_KEY}`
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user',   content: question }
                ],
                max_tokens: 1024,
                temperature: 0.7
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `Lỗi kết nối HTTP ${res.status}`);
        }

        const data = await res.json();
        const text = data?.choices?.[0]?.message?.content;
        if (!text) throw new Error('API không trả về nội dung');
        return text;
    }

    // ===== XỬ LÝ SỰ KIỆN GIAO DIỆN =====
    userInput.addEventListener('input', function() {
      this.style.height = '24px';
      this.style.height = (this.scrollHeight) + 'px';
      if (this.scrollHeight > 150) {
        this.style.overflowY = 'auto';
      } else {
        this.style.overflowY = 'hidden';
      }
    });

    function fillInput(text) {
      if(isSending || !GROQ_KEY) return;
      userInput.value = text;
      userInput.focus();
      sendMessage(); // Tự động gửi khi ấn nút gợi ý cho tiện
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollToBottom() {
      setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 50);
    }

    // Hàm format Markdown sang HTML của AI
    function fmt(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
            .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
            .replace(/(<li>.*?<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
            .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
    }

    // Bảo mật hiển thị văn bản thuần của người dùng nhập
    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag] || tag));
    }

    function appendUserMessage(text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message msg-user';
      msgDiv.innerHTML = `
        <div class="msg-sender">Kiểm sát viên</div>
        <div class="msg-bubble">${escapeHTML(text)}</div>
      `;
      chatWrapper.appendChild(msgDiv);
      scrollToBottom();
    }

    function appendAIMessage(htmlContent) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message msg-ai';
      msgDiv.innerHTML = `
        <div class="msg-sender">AI</div>
        <div class="msg-bubble">${htmlContent}</div>
      `;
      chatWrapper.appendChild(msgDiv);
      scrollToBottom();
    }

    function showTypingIndicator() {
      const id = 'typing-' + Date.now();
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message msg-ai';
      msgDiv.id = id;
      msgDiv.innerHTML = `
        <div class="msg-sender">Đang phân tích dữ liệu</div>
        <div class="msg-bubble" style="padding: 10px 18px;">
          <span class="typing-indicator"></span>
          <span class="typing-indicator"></span>
          <span class="typing-indicator"></span>
        </div>
      `;
      chatWrapper.appendChild(msgDiv);
      scrollToBottom();
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function setSendingState(state) {
        isSending = state;
        sendBtn.disabled = state;
        userInput.disabled = state;
        // Disable suggestion chips while loading
        document.querySelectorAll('.suggestion-chip').forEach(btn => btn.disabled = state);
    }

    // ===== HÀM XỬ LÝ CHÍNH =====
    async function sendMessage() {
      if (isSending || !GROQ_KEY) return;
      
      const text = userInput.value.trim();
      if (!text) return;

      appendUserMessage(text);
      userInput.value = '';
      userInput.style.height = '24px';
      setSendingState(true);

      const typingId = showTypingIndicator();

      try {
          let context = '';
          const lowerQ = text.toLowerCase();
          
          // Kiểm tra xem câu hỏi có cần context dữ liệu hệ thống không
          if (['dữ liệu','hồ sơ','thống kê','bao nhiêu','tổng','tháng','hôm nay','phân tích','số liệu'].some(k => lowerQ.includes(k))) {
              const data = await fetchSystemData();
              context = `Án dân sự: ${data.tong.an} (${data.phanLoai}), THA: ${data.tong.tha}, Khiếu tố: ${data.tong.dkt}. Tháng này: án ${data.thang.an}, THA ${data.thang.tha}, KT ${data.thang.dkt}. Hôm nay: án ${data.homNay.an}, THA ${data.homNay.tha}, KT ${data.homNay.dkt}.`;
          }

          const reply = await callGroq(text, context);
          
          removeTypingIndicator(typingId);
          appendAIMessage(fmt(reply));

      } catch (error) {
          removeTypingIndicator(typingId);
          appendAIMessage(`⚠️ **Lỗi hệ thống:** ${error.message}`);
      }

      setSendingState(false);
      userInput.focus();
    }

    // Chạy khi khởi động
    window.onload = initApp;
  </script>
</body>
</html>
